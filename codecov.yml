codecov:
  require_ci_to_pass: yes
  notify:
    wait_for_ci: yes
    after_n_builds: 2

coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: 80%
        threshold: 5%
        base: auto
        if_not_found: success
        if_ci_failed: error
        informational: false
        only_pulls: false
      backend:
        target: 75%
        flags:
          - backend
      frontend:
        target: 70%
        flags:
          - frontend
    patch:
      default:
        target: 80%
        threshold: 5%
        base: auto
        if_not_found: success
        if_ci_failed: error
        informational: false
        only_pulls: false

flags:
  backend:
    paths:
      - backend/app/
    carryforward: true
  frontend:
    paths:
      - frontend/src/
    carryforward: true

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
  require_changes: false
  require_base: no
  require_head: yes
  hide_project_coverage: false

ignore:
  - "backend/.venv/**/*"
  - "backend/**/__pycache__/**/*"
  - "backend/**/test*/**/*"
  - "backend/tests/**/*"
  - "frontend/node_modules/**/*"
  - "frontend/dist/**/*"
  - "frontend/__tests__/**/*"
