# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"

reviews:
  profile: "assertive"
  # Formally request changes when issues are found so PRs cannot be merged
  # without resolution. With an AI-first workflow (Jules auto-fixes), this
  # ensures every CodeRabbit finding is explicitly addressed before merge.
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true

  instructions: >
    You are reviewing code that may have been written by an AI agent (Jules).
    When generating the 'Prompt for all review comments with AI agents', be extremely precise.
    Include exact file paths, line numbers, and literal replacement strings or clear logical requirements.
    Mention that the project is a FastAPI backend (Python 3.13) and React Native frontend (TypeScript/Expo).
    Remind the AI agent to run `make lint` and `make test` to verify its changes before pushing.

  path_instructions:
    - path: "backend/**/*.py"
      instructions: >
        Ensure type hints are used on all function signatures.
        Check for proper FastAPI dependency injection and HTTPException handling.
        Validate against Ruff, Black, and Mypy standards (line length 100, double quotes).
        Use `str | None` not `Optional[str]`; `list[str]` not `List[str]`.

    - path: "frontend/src/**/*.{ts,tsx,js,jsx}"
      instructions: >
        Ensure `const` and `let` are used appropriately.
        State management uses Zustand (https://zustand-demo.pmnd.rs/).
        Prefer `FlatList` for long lists instead of nested views.
        Ensure hook cleanup in `useEffect` and cleanup of refs/listeners (useRef, add/remove listeners).
        Remove Flutter-only mentions like StatefulWidget, setState, BLoC, GetX, and dispose().

  labels:
    auto_label: true
    labeling_instructions:
      - label: "bug"
        instructions: "Apply if the PR fixes an existing issue or crash."
      - label: "security"
        instructions: "Apply if the PR addresses a security vulnerability or exposes sensitive data."
      - label: "performance"
        instructions: "Apply if the PR improves execution speed or memory usage."
      - label: "refactor"
        instructions: "Apply if the PR restructures code without changing behavior."

  auto_review:
    enabled: true
    drafts: false
