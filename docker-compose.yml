version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: miru_db
    environment:
      POSTGRES_USER: miru
      POSTGRES_PASSWORD: miru
      POSTGRES_DB: miru
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miru"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
