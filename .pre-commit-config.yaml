repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      # Linter
      - id: ruff
        args: [--fix]
      # Formatter (replaces black)
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty-check
        name: ty type check
        entry: bash -c 'cd backend && uv run ty check .'
        language: system
        types: [python]
        pass_filenames: false
