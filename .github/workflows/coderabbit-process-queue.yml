name: CodeRabbit Queue Processor

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual triggering for testing

jobs:
  process-queue:
    name: Process CodeRabbit Queue
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Process Queued PRs
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -c "
          import os, json, datetime
          import urllib.request, urllib.parse

          repo_owner = os.environ.get('REPO_OWNER')
          repo_name = os.environ.get('REPO_NAME')
          token = os.environ.get('GITHUB_TOKEN')
          api_base = f'https://api.github.com/repos/{repo_owner}/{repo_name}'
          headers = {
              'Authorization': f'token {token}',
              'Accept': 'application/vnd.github.v3+json',
              'User-Agent': 'CodeRabbit-Queue-Processor'
          }

          # Find all tracking issues
          # GET /repos/{owner}/{repo}/issues?labels=coderabbit:tracking&state=open
          query = urllib.parse.urlencode({'labels': 'coderabbit:tracking', 'state': 'open'})
          issues_url = f'{api_base}/issues?{query}'

          req = urllib.request.Request(issues_url, headers=headers)
          try:
              with urllib.request.urlopen(req) as response:
                  issues = json.loads(response.read().decode())
          except Exception as e:
              print(f'Failed to fetch tracking issues: {e}')
              exit(1)

          if not issues:
              print('No open tracking issues found. Queue is empty.')
              exit(0)

          now = datetime.datetime.now(datetime.timezone.utc)
          print(f'Current time (UTC): {now.isoformat()}')

          for issue in issues:
              issue_number = issue.get('number')
              body = issue.get('body', '')

              # Extract PR number and unlock time from the body
              pr_match = re.search(r'\*\*PR:\*\* #(\d+)', body)
              unlock_match = re.search(r'\*\*Unlock Time \(UTC\):\*\* (.*)', body)

              if not pr_match or not unlock_match:
                  print(f'Could not parse issue #{issue_number}, skipping.')
                  continue

              pr_number = pr_match.group(1)
              unlock_str = unlock_match.group(1).strip()

              try:
                  unlock_time = datetime.datetime.fromisoformat(unlock_str)
              except Exception as e:
                  print(f'Failed to parse unlock time {unlock_str} for issue #{issue_number}: {e}')
                  continue

              print(f'Tracking Issue #{issue_number} -> PR #{pr_number}. Unlock Time: {unlock_time.isoformat()}')

              if now >= unlock_time:
                  print(f'PR #{pr_number} is unlocked! Triggering review...')

                  # 1. Post comment on PR
                  comment_url = f'{api_base}/issues/{pr_number}/comments'
                  comment_data = json.dumps({'body': '@coderabbitai review'}).encode('utf-8')
                  comment_req = urllib.request.Request(comment_url, data=comment_data, headers=headers, method='POST')
                  try:
                      urllib.request.urlopen(comment_req)
                      print(f'Successfully requested review on PR #{pr_number}')
                  except Exception as e:
                      print(f'Failed to post comment on PR #{pr_number}: {e}')

                  # 2. Remove 'coderabbit:queued' label from PR
                  label_url = f'{api_base}/issues/{pr_number}/labels/coderabbit%3Aqueued'
                  label_req = urllib.request.Request(label_url, headers=headers, method='DELETE')
                  try:
                      urllib.request.urlopen(label_req)
                      print(f'Successfully removed queued label from PR #{pr_number}')
                  except Exception as e:
                      print(f'Failed to remove label (it might not exist): {e}')

                  # 3. Close the tracking issue
                  close_url = f'{api_base}/issues/{issue_number}'
                  close_data = json.dumps({'state': 'closed', 'state_reason': 'completed'}).encode('utf-8')
                  close_req = urllib.request.Request(close_url, data=close_data, headers=headers, method='PATCH')
                  try:
                      urllib.request.urlopen(close_req)
                      print(f'Successfully closed tracking issue #{issue_number}')
                  except Exception as e:
                      print(f'Failed to close issue #{issue_number}: {e}')
              else:
                  print(f'PR #{pr_number} is still locked. Will check again later.')
          "
