name: Flutter CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter-pipeline.yml'
      - '.github/workflows/reusable-flutter-build.yml'
      - '.github/workflows/reusable-flutter-setup.yml'
      - '.github/actions/flutter-generate-code/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: flutter-pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.41.4'

jobs:
  flutter-ci:
    name: Flutter CI
    uses: ./.github/workflows/reusable-flutter-setup.yml
    with:
      flutter-version: ${{ vars.FLUTTER_VERSION || '3.41.4' }}
      working-directory: './frontend'
      run-tests: true
      run-lint: true
      upload-coverage: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  android-build:
    name: Build Android
    needs: [flutter-ci]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    uses: ./.github/workflows/reusable-flutter-build.yml
    with:
      flutter-version: ${{ vars.FLUTTER_VERSION || '3.41.4' }}
      target: android
      working-directory: './frontend'
      artifact-name: android-apk
      artifact-path: build/app/outputs/flutter-apk/app-release.apk
    secrets:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_KEY }}
      BACKEND_URL: ${{ vars.PRODUCTION_URL }}

  ios-build:
    name: Build iOS
    needs: [flutter-ci]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    uses: ./.github/workflows/reusable-flutter-build.yml
    with:
      flutter-version: ${{ vars.FLUTTER_VERSION || '3.41.4' }}
      target: ios
      runs-on: macos-latest
      working-directory: './frontend'
      artifact-name: ios-app
      artifact-path: build/ios/iphoneos/Runner.app
    secrets:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_KEY }}
      BACKEND_URL: ${{ vars.PRODUCTION_URL }}

  web-build:
    name: Build Web
    needs: [flutter-ci]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    uses: ./.github/workflows/reusable-flutter-build.yml
    with:
      flutter-version: ${{ vars.FLUTTER_VERSION || '3.41.4' }}
      target: web
      working-directory: './frontend'
      artifact-name: web-build
      artifact-path: build/web
    secrets:
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_KEY }}
      BACKEND_URL: ${{ vars.PRODUCTION_URL }}

  smoke-test-web:
    name: Web Smoke Test
    needs: [web-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Web Build
        uses: actions/download-artifact@v8
        with:
          name: web-build
          path: ./web-dist
      - name: Run Lighthouse (Smoke Test)
        uses: treosh/lighthouse-ci-action@v12
        # All assertions are 'warn' severity — don't block deploy on score regressions,
        # but still surface results in the workflow summary.
        continue-on-error: true
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: './frontend/.lighthouserc.json'

  deploy:
    name: Deploy Web to Azure Static Web Apps
    # Only depends on smoke-test-web (which depends on web-build).
    # android-build and ios-build are independent publish targets — they must
    # not gate web deployment, and are skipped on PRs/develop anyway.
    needs: [smoke-test-web]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy-web.outputs.static_web_app_url }}
    steps:
      - name: Download Web Build
        uses: actions/download-artifact@v8
        with:
          name: web-build
          path: ./web-dist

      - name: Deploy Web to Azure Static Web Apps
        id: deploy-web
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: './web-dist'
          skip_app_build: true
