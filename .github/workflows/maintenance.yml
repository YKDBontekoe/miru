name: Maintenance & Infrastructure

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
  schedule:
    - cron: '0 2 * * 0' # Every Sunday at 2:00 AM UTC (Cleanup)
    - cron: '0 * * * *' # Every hour (Sentry Sync)
  workflow_dispatch:

# Permissions are declared per-job to follow least-privilege.
# No workflow-level permissions block — defaults are read-only.

jobs:
  # --- GitHub Label Sync ---
  sync-labels:
    name: Sync GitHub Labels
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - uses: micnncim/action-label-syncer@v1
        with:
          manifest: .github/labels.yml
          token: ${{ secrets.GITHUB_TOKEN }}

  # --- Artifact & Branch Cleanup ---
  cleanup:
    name: Cleanup Old Data
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 10
      - name: Delete old artifacts
        uses: geekyeggo/delete-artifact@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          name: |
            web-build
            web-release
            ios-app
            ios-release
            android-apk
            android-bundle
          failOnError: false
      - name: Delete stale branches
        run: |
          git fetch --prune origin
          git branch -r --merged origin/main | grep -v "HEAD\|origin/main\|origin/develop" | sed 's|origin/||' | while read BRANCH; do
            LAST=$(git log -1 --format=%ct "origin/$BRANCH" 2>/dev/null || echo 0)
            if [ "$(( ($(date +%s) - LAST) / 86400 ))" -gt 90 ]; then
              git push origin --delete "$BRANCH" || true
            fi
          done

  # --- Sentry to GitHub Sync ---
  sentry-sync:
    name: Sentry to GitHub Sync
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check required credentials
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
        run: |
          if [ -z "$SENTRY_AUTH_TOKEN" ] || [ -z "$SENTRY_ORG" ]; then
            echo "SENTRY_AUTH_TOKEN or SENTRY_ORG is not set — skipping Sentry sync."
            exit 0
          fi
          echo "Credentials present, proceeding with sync."

      - name: Fetch and sync backend Sentry issues
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_BACKEND }}
        if: env.SENTRY_AUTH_TOKEN != '' && env.SENTRY_ORG != '' && env.SENTRY_PROJECT != ''
        run: |
          curl -sf -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            "https://sentry.io/api/0/projects/$SENTRY_ORG/$SENTRY_PROJECT/issues/?query=is:unresolved" \
            > /tmp/sentry-backend.json
          echo "backend_issues=$(jq -c '.' /tmp/sentry-backend.json)" >> $GITHUB_ENV

      - name: Fetch and sync frontend Sentry issues
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_FRONTEND }}
        if: env.SENTRY_AUTH_TOKEN != '' && env.SENTRY_ORG != '' && env.SENTRY_PROJECT != ''
        run: |
          curl -sf -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            "https://sentry.io/api/0/projects/$SENTRY_ORG/$SENTRY_PROJECT/issues/?query=is:unresolved" \
            > /tmp/sentry-frontend.json
          echo "frontend_issues=$(jq -c '.' /tmp/sentry-frontend.json)" >> $GITHUB_ENV

      - name: Create GitHub issues for new Sentry errors
        uses: actions/github-script@v8
        env:
          BACKEND_ISSUES: ${{ env.backend_issues }}
          FRONTEND_ISSUES: ${{ env.frontend_issues }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: 'sentry-issue'
            });
            const openTitles = new Set(existing.map(i => i.title));

            const allIssues = [
              ...(JSON.parse(process.env.BACKEND_ISSUES || '[]')),
              ...(JSON.parse(process.env.FRONTEND_ISSUES || '[]')),
            ];

            for (const issue of allIssues) {
              const title = `[Sentry] ${issue.title}`;
              if (!openTitles.has(title)) {
                await github.rest.issues.create({
                  owner, repo, title,
                  body: `**Sentry**: [${issue.title}](${issue.permalink})\n\n${issue.culprit}`,
                  labels: ['sentry-issue', 'jules-fix-pending'],
                });
              }
            }
