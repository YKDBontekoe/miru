name: Reusable - Frontend Build

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        type: string
        default: '20'
      target:
        description: 'Build target: web'
        type: string
        required: true
      working-directory:
        description: 'Working directory'
        type: string
        default: './frontend'
      runs-on:
        description: 'Runner OS'
        type: string
        default: 'ubuntu-latest'
      artifact-name:
        description: 'Name for the uploaded build artifact'
        type: string
        required: true
      artifact-path:
        description: 'Path to upload as artifact'
        type: string
        required: true
    secrets:
      SUPABASE_URL:
        required: false
      SUPABASE_ANON_KEY:
        required: false
      API_URL:
        required: false

jobs:
  build:
    name: Build (${{ inputs.target }})
    runs-on: ${{ inputs.runs-on }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Web
        if: inputs.target == 'web'
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_API_URL: ${{ secrets.API_URL }}
        run: npx expo export -p web

      - name: Upload artifact
        uses: actions/upload-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.working-directory }}/${{ inputs.artifact-path }}
