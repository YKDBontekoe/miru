name: Flutter Web - Smoke Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter-web-smoke-test.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter-web-smoke-test.yml'

env:
  FLUTTER_VERSION: '3.41.0'

jobs:
  smoke-test:
    name: Flutter Web Smoke Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      # -----------------------------------------------------------------------
      # Unit + widget tests (fast gate before spinning up Chrome)
      # -----------------------------------------------------------------------
      - name: Run unit & widget tests
        run: flutter test --coverage --reporter=github

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./frontend/coverage/lcov.info
          flags: flutter-smoke
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      # -----------------------------------------------------------------------
      # Build the web app
      # -----------------------------------------------------------------------
      - name: Build web app
        run: flutter build web --release --dart-define=API_URL=http://localhost:8000

      # -----------------------------------------------------------------------
      # Serve the built app and run smoke tests in Chrome (headless)
      # -----------------------------------------------------------------------
      - name: Install chromedriver
        uses: nanasess/setup-chromedriver@v2

      - name: Start chromedriver
        run: |
          chromedriver --port=4444 &
          echo "Waiting for chromedriver..."
          sleep 2

      - name: Serve built web app
        run: |
          npx --yes serve -s build/web -l 8080 &
          echo "Waiting for server to be ready..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 | grep -q "200"; then
              echo "Server is up after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Server did not become ready within 30 seconds"
              exit 1
            fi
            sleep 1
          done

      - name: Verify app is reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::App did not return HTTP 200 (got $STATUS)"
            exit 1
          fi

      - name: Verify index.html contains expected content
        run: |
          BODY=$(curl -s http://localhost:8080)
          if ! echo "$BODY" | grep -q "flutter"; then
            echo "::error::index.html does not look like a Flutter web app"
            exit 1
          fi
          echo "index.html looks correct."

      - name: Run integration smoke tests (Chrome headless)
        run: |
          flutter drive \
            --driver=test_driver/integration_test_driver.dart \
            --target=integration_test/smoke_test.dart \
            -d web-server \
            --web-port=8081 \
            --headless \
            --browser-name=chrome
        continue-on-error: false

      # -----------------------------------------------------------------------
      # Accessibility check — axe-core via curl + node
      # -----------------------------------------------------------------------
      - name: Install axe-core CLI
        run: npm install --global @axe-core/cli
        continue-on-error: true

      - name: Run accessibility check
        run: axe http://localhost:8080 --exit
        continue-on-error: true   # informational; does not fail the pipeline

      # -----------------------------------------------------------------------
      # Performance budget — Lighthouse CI
      # -----------------------------------------------------------------------
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8080
          uploadArtifacts: true
          temporaryPublicStorage: false
          runs: 1
          budgetPath: ./frontend/.lighthouserc.json
        continue-on-error: true   # informational; does not fail the pipeline
