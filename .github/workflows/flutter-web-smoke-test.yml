name: Flutter Web - Smoke Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter-web-smoke-test.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter-web-smoke-test.yml'

env:
  FLUTTER_VERSION: '3.41.0'

jobs:
  smoke-test:
    name: Flutter Web Smoke Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      # -----------------------------------------------------------------------
      # Unit + widget tests (fast gate before spinning up Chrome)
      # -----------------------------------------------------------------------
      - name: Run unit & widget tests
        run: flutter test --coverage --reporter=github

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./frontend/coverage/lcov.info
          flags: flutter-smoke
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      # -----------------------------------------------------------------------
      # Setup ephemeral Local Backend & Supabase
      # -----------------------------------------------------------------------
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Local Supabase
        working-directory: ./supabase
        run: |
          supabase start
          # Save the output environment variables for later steps
          supabase status -o env > ../backend/.env.test

      - name: Setup Python & uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: uv sync

      - name: Start FastAPI Backend
        working-directory: ./backend
        run: |
          source .env.test
          export DATABASE_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          export SUPABASE_URL="http://127.0.0.1:54321"
          export SUPABASE_KEY="$ANON_KEY"
          export SUPABASE_SERVICE_ROLE_KEY="$SERVICE_ROLE_KEY"
          export SUPABASE_JWT_SECRET="super-secret-jwt-token-with-at-least-32-characters-long"
          export CORS_ALLOWED_ORIGINS="*"
          export WEBAUTHN_RP_ID="127.0.0.1"
          export WEBAUTHN_RP_NAME="Miru Test CI"
          export WEBAUTHN_EXPECTED_ORIGIN="http://127.0.0.1:8080"
          export OPENROUTER_API_KEY="test"
          export DEFAULT_CHAT_MODEL="test"
          export EMBEDDING_MODEL="test"

          # Run the backend in the background
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &

          # Wait for backend to be healthy
          echo "Waiting for backend..."
          backend_up=0
          for i in {1..30}; do
            if curl -s http://127.0.0.1:8000/health | grep -q "status"; then
              echo "Backend is up!"
              backend_up=1
              break
            fi
            sleep 1
          done

          if [ $backend_up -eq 0 ]; then
            echo "::error::Backend failed to start"
            exit 1
          fi
      # -----------------------------------------------------------------------
      # Build the web app
      # -----------------------------------------------------------------------
      - name: Extract Supabase Keys
        id: supabase-keys
        run: |
          ANON_KEY=$(grep 'ANON_KEY=' ../backend/.env.test | cut -d '=' -f2 | tr -d '"')
          echo "ANON_KEY=$ANON_KEY" >> $GITHUB_OUTPUT

      - name: Build web app
        run: |
          flutter build web --release \
            --dart-define=API_URL=http://127.0.0.1:8000/api/v1 \
            --dart-define=SUPABASE_URL=http://127.0.0.1:54321 \
            --dart-define=SUPABASE_ANON_KEY=${{ steps.supabase-keys.outputs.ANON_KEY }}

      # -----------------------------------------------------------------------
      # Serve the built app and run smoke tests in Chrome (headless)
      # -----------------------------------------------------------------------
      - name: Install chromedriver
        uses: nanasess/setup-chromedriver@v2

      - name: Start chromedriver
        run: |
          chromedriver --port=4444 &
          echo "Waiting for chromedriver..."
          sleep 2

      - name: Serve built web app
        run: |
          npx --yes serve -s build/web -l 8080 &
          echo "Waiting for server to be ready..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080 | grep -q "200"; then
              echo "Server is up after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Server did not become ready within 30 seconds"
              exit 1
            fi
            sleep 1
          done

      - name: Verify app is reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::App did not return HTTP 200 (got $STATUS)"
            exit 1
          fi

      - name: Verify index.html contains expected content
        run: |
          BODY=$(curl -s http://127.0.0.1:8080)
          if ! echo "$BODY" | grep -q "flutter"; then
            echo "::error::index.html does not look like a Flutter web app"
            exit 1
          fi
          echo "index.html looks correct."

      - name: Run integration smoke tests (Chrome headless)
        run: |
          flutter drive \
            --driver=test_driver/integration_test_driver.dart \
            --target=integration_test/smoke_test.dart \
            -d web-server \
            --web-port=8081 \
            --headless \
            --browser-name=chrome \
            --dart-define=API_URL=http://127.0.0.1:8000/api/v1 \
            --dart-define=SUPABASE_URL=http://127.0.0.1:54321 \
            --dart-define=SUPABASE_ANON_KEY=${{ steps.supabase-keys.outputs.ANON_KEY }}
        continue-on-error: false

      # -----------------------------------------------------------------------
      # Accessibility check — axe-core via curl + node
      # -----------------------------------------------------------------------
      - name: Install axe-core CLI
        run: npm install --global @axe-core/cli
        continue-on-error: true

      - name: Run accessibility check
        run: axe http://127.0.0.1:8080 || echo "Axe checks failed or could not run"
        continue-on-error: true   # informational; does not fail the pipeline

      # -----------------------------------------------------------------------
      # Performance budget — Lighthouse CI
      # -----------------------------------------------------------------------
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://127.0.0.1:8080
          uploadArtifacts: true
          temporaryPublicStorage: false
          runs: 1
          budgetPath: ./frontend/.lighthouserc.json
        continue-on-error: true   # informational; does not fail the pipeline

      # -----------------------------------------------------------------------
      # Cleanup ephemeral local instances
      # -----------------------------------------------------------------------
      - name: Stop processes
        if: always()
        run: |
          # Kill all running background jobs like UV and uvicorn
          kill $(jobs -p) 2>/dev/null || true
          pkill uvicorn || true

      - name: Stop Local Supabase
        if: always()
        working-directory: ./supabase
        run: supabase stop
