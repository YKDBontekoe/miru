name: Sentry to GitHub Issue Sync

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

permissions:
  issues: write

concurrency:
  group: sentry-to-github-sync
  cancel-in-progress: false

jobs:
  sync-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Latest Sentry Issues
        id: sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_BACKEND }}
        run: |
          # Fetch unresolved issues from Sentry
          HTTP_CODE=$(curl -s -o /tmp/sentry_response.json -w "%{http_code}" \
            -H "Authorization: Bearer $SENTRY_AUTH_TOKEN" \
            "https://sentry.io/api/0/projects/$SENTRY_ORG/$SENTRY_PROJECT/issues/?query=is:unresolved")

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Sentry API returned HTTP $HTTP_CODE"
            cat /tmp/sentry_response.json
            exit 1
          fi

          # Validate that the response is a JSON array
          if ! jq -e 'type == "array"' /tmp/sentry_response.json > /dev/null 2>&1; then
            echo "::error::Sentry API returned non-array response"
            cat /tmp/sentry_response.json
            exit 1
          fi

          # Pass issues to next step using delimiter syntax for multiline safety
          echo "issues<<SENTRY_EOF" >> $GITHUB_OUTPUT
          jq -c '.' /tmp/sentry_response.json >> $GITHUB_OUTPUT
          echo "SENTRY_EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issues = JSON.parse(process.env.ISSUES || '[]');
            if (!Array.isArray(issues)) {
              core.setFailed('ISSUES env var is not a JSON array');
              return;
            }

            const { owner, repo } = context.repo;

            // Fetch all open sentry issues once for deduplication
            // Only skip if there's an open issue — if only closed issues match,
            // the bug has resurfaced and a new issue should be created.
            const existingIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: 'sentry-issue',
              per_page: 100
            });
            const openTitles = new Set(existingIssues.map(i => i.title));

            for (const issue of issues) {
              const title = `[Sentry] ${issue.title}`;
              const body = `
              **Sentry Issue**: [${issue.title}](${issue.permalink})
              **Level**: ${issue.level}
              **First Seen**: ${issue.firstSeen}
              **Last Seen**: ${issue.lastSeen}
              
              **Culprit**: ${issue.culprit}
              
              ---
              ${issue.metadata.value || ''}
              `;

              if (openTitles.has(title)) {
                console.log(`Skipping (open issue exists): ${title}`);
                continue;
              }

              console.log(`Creating issue: ${title}`);
              await github.rest.issues.create({
                owner,
                repo,
                title: title,
                body: body,
                labels: ['sentry-issue', 'jules-fix-pending']
              });
              // Add to set so subsequent iterations don't create duplicates
              openTitles.add(title);
            }
        env:
          ISSUES: ${{ steps.sentry.outputs.issues }}
