name: Flutter Android CI/CD - Deploy to Google Play

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter-android-deploy.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      track:
        description: 'Google Play track to deploy to'
        required: false
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

env:
  FLUTTER_VERSION: '3.19.0'
  JAVA_VERSION: '17'

jobs:
  test:
    name: Test Android App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/lcov.info
          flags: flutter-android
          name: flutter-android-coverage
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build Android APK / AAB
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Get build number
        id: build_number
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Setup Android signing keystore
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=keystore.jks
          EOF

      - name: Build Android App Bundle (release)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: |
          flutter build appbundle \
            --release \
            --dart-define=API_URL=${{ secrets.BACKEND_API_URL }} \
            --build-number=${{ steps.build_number.outputs.number }}

      - name: Build Android APK (debug, for PRs)
        if: github.event_name == 'pull_request'
        run: |
          flutter build apk \
            --debug \
            --dart-define=API_URL=${{ secrets.BACKEND_API_URL || 'http://localhost:8000' }} \
            --build-number=${{ steps.build_number.outputs.number }}

      - name: Upload AAB artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: frontend/build/app/outputs/bundle/release/*.aab
          retention-days: 7

      - name: Upload APK artifact (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: frontend/build/app/outputs/flutter-apk/*.apk
          retention-days: 3

      - name: Clean up keystore
        if: always()
        run: |
          rm -f android/app/keystore.jks android/key.properties || true

  deploy-internal:
    name: Deploy to Google Play (Internal)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging-android

    steps:
      - uses: actions/checkout@v4

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: ./aab

      - name: Deploy to Google Play Internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.ANDROID_PACKAGE_NAME }}
          releaseFiles: ./aab/*.aab
          track: internal
          status: completed

  deploy-production:
    name: Deploy to Google Play (Production)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production-android

    steps:
      - uses: actions/checkout@v4

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: ./aab

      - name: Deploy to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.ANDROID_PACKAGE_NAME }}
          releaseFiles: ./aab/*.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          inAppUpdatePriority: 2
