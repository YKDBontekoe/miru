name: Cleanup and Maintenance

on:
  schedule:
    # Run every Sunday at 2:00 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  packages: write

jobs:
  cleanup-artifacts:
    name: Cleanup Old Artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 10

      - name: Delete old artifacts
        uses: geekyeggo/delete-artifact@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          name: |
            flutter-web-build
            ios-ipa
            android-aab
            android-apk-debug
          failOnError: false

  cleanup-packages:
    name: Cleanup Old Packages
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Delete old container images
        uses: actions/delete-package-versions@v4
        with:
          package-name: 'miru-backend'
          package-type: 'container'
          min-versions-to-keep: 10
          delete-only-untagged-versions: true
        continue-on-error: true

  stale-branches:
    name: Cleanup Stale Branches
    runs-on: ubuntu-latest
    # Runs on both the weekly schedule and manual dispatch

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Delete stale merged branches (older than 90 days)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STALENESS_DAYS=90
          CURRENT_TIME=$(date +%s)

          echo "### Stale Branch Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Branches merged into \`main\` and older than ${STALENESS_DAYS} days:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          git fetch --prune origin

          git branch -r --merged origin/main \
            | grep -v "HEAD\|origin/main\|origin/develop" \
            | sed 's|origin/||' \
            | while read BRANCH_NAME; do
              LAST_COMMIT=$(git log -1 --format=%ct "origin/$BRANCH_NAME" 2>/dev/null || echo 0)
              DAYS_OLD=$(( (CURRENT_TIME - LAST_COMMIT) / 86400 ))

              if [ "$DAYS_OLD" -gt "$STALENESS_DAYS" ]; then
                echo "- Deleting \`$BRANCH_NAME\` (${DAYS_OLD} days old)" >> $GITHUB_STEP_SUMMARY
                git push origin --delete "$BRANCH_NAME" || echo "  (failed to delete $BRANCH_NAME, skipping)"
              fi
            done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Cleanup complete." >> $GITHUB_STEP_SUMMARY
