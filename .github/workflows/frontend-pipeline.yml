name: Frontend CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-pipeline.yml'
      - '.github/workflows/reusable-frontend-setup.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: frontend-pipeline-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  frontend-ci:
    name: Frontend CI
    uses: ./.github/workflows/reusable-frontend-setup.yml
    with:
      node-version: '20'
      working-directory: './frontend'
      run-tests: true
      run-lint: true
      upload-coverage: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_KEY }}

  web-build:
    name: Build Web
    needs: [frontend-ci]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build Web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_KEY }}
          EXPO_PUBLIC_API_URL: ${{ vars.PRODUCTION_URL }}
        run: npx expo export -p web
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: ./frontend/dist

  smoke-test-web:
    name: Web Smoke Test
    needs: [web-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: ./web-dist
      - name: Run Lighthouse (Smoke Test)
        uses: treosh/lighthouse-ci-action@v12
        continue-on-error: true
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: './frontend/.lighthouserc.json'

  deploy:
    name: Deploy Web to Azure Static Web Apps
    needs: [smoke-test-web]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy-web.outputs.static_web_app_url }}
    steps:
      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: ./web-dist

      - name: Verify backend is healthy before deploying frontend
        run: |
          BACKEND_URL="${{ vars.PRODUCTION_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            echo "::warning::PRODUCTION_URL is not set — skipping backend health gate."
            exit 0
          fi
          echo "Checking backend health at ${BACKEND_URL}/health (scale-to-zero aware) ..."
          for i in $(seq 1 5); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 --max-time 90 \
              "${BACKEND_URL}/health" || echo "000")
            echo "Attempt ${i}/5: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy — proceeding with frontend deploy."
              exit 0
            fi
            [ "$i" -lt 5 ] && sleep 5
          done
          echo "::error::Backend did not respond with HTTP 200 after 5 attempts. Aborting frontend deploy to avoid API version skew."
          exit 1

      - name: Deploy Web to Azure Static Web Apps
        id: deploy-web
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: './web-dist'
          skip_app_build: true
