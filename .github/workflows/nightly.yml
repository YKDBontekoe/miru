name: Nightly Build and Dependency Check

on:
  schedule:
    # Run every day at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: nightly-${{ github.workflow }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.13'
  NODE_VERSION: '20'

jobs:
  # Backend dependency check
  backend-dependencies:
    name: Check Python Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Run security audit
        id: security_audit
        working-directory: ./backend
        run: |
          uv sync --all-extras
          echo "### Security Check (Safety)" >> "$GITHUB_STEP_SUMMARY"
          # safety check is used because safety scan requires an account/key in CI
          uv run safety check --policy-file .safety-policy.yml >> "$GITHUB_STEP_SUMMARY" || echo "Safety found issues"
          echo "### Security Check (pip-audit)" >> "$GITHUB_STEP_SUMMARY"
          # SEC(agent): review needed - ignoring GHSA-rf74-v2fm-23pw, GHSA-gfwx-w7gr-fvh7 (nltk via safety dev dependency) which have no current fixes
          uv run pip-audit --ignore-vuln GHSA-w8v5-vhqr-4h9v --ignore-vuln GHSA-rf74-v2fm-23pw --ignore-vuln GHSA-gfwx-w7gr-fvh7 --ignore-vuln GHSA-jm6w-m3j8-898g >> "$GITHUB_STEP_SUMMARY" || echo "pip-audit found issues"
        continue-on-error: true

      - name: Create issue if vulnerabilities found
        if: steps.security_audit.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          script: |
            const title = '🔒 Security: Vulnerabilities found in Python dependencies';
            const body = `## Security Alert

            Automated security scan found vulnerabilities in Python dependencies.

            **Run Date:** ${new Date().toISOString()}
            **Workflow:** ${{ github.workflow }}

            Please review the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

            ### Recommended Actions:
            1. Run \`safety check\` locally
            2. Update vulnerable dependencies
            3. Run tests to ensure compatibility
            4. Create a PR with the updates
            `;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,dependencies,frontend',
              state: 'open'
              });

              const alreadyOpen = existing.data.some(issue => issue.title === title);

              if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'dependencies', 'frontend', 'jules-fix-pending']
              });
              }


  # Frontend dependency check
  frontend-dependencies:
    name: Check Frontend Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Check for outdated dependencies
        working-directory: ./frontend
        run: |
          echo "### Outdated Dependencies" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          npm outdated >> "$GITHUB_STEP_SUMMARY" || true

      - name: Run security audit
        id: npm_audit
        working-directory: ./frontend
        run: npm audit
        continue-on-error: true

      - name: Create issue if vulnerabilities found
        if: steps.npm_audit.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          script: |
            const title = '🔒 Security: Vulnerabilities found in Frontend dependencies';
            const body = `## Security Alert

            Automated \`npm audit\` found vulnerabilities in Frontend dependencies.

            **Run Date:** ${new Date().toISOString()}
            **Workflow:** ${{ github.workflow }}

            Please review the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

            ### Recommended Actions:
            1. Run \`npm audit fix\` locally
            2. Update vulnerable dependencies
            3. Run tests to ensure compatibility
            4. Create a PR with the updates
            `;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,dependencies,frontend',
              state: 'open'
              });

              const alreadyOpen = existing.data.some(issue => issue.title === title);

              if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['security', 'dependencies', 'frontend', 'jules-fix-pending']
              });
              }


  # Nightly build test
  nightly-build:
    name: Nightly Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Web
        working-directory: ./frontend
        run: npx expo export -p web

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = `🔥 Nightly Build Failed: Frontend Web`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'bug,ci/cd',
              state: 'open',
            });
            if (existing.data.some(i => i.title === title)) {
              console.log(`Issue already open for "${title}" — skipping creation.`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `## Build Failure

            The nightly build for **Frontend Web** failed.

            **Run Date:** ${new Date().toISOString()}
            **Workflow:** ${{ github.workflow }}

            Please review the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
            `,
              labels: ['bug', 'ci/cd'],
            });

  # Backend build test
  backend-build-test:
    name: Backend Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: false
          tags: miru-backend:nightly
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run -d -p 8000:8000 --name miru-backend-test miru-backend:nightly
          echo "Waiting for /health to return HTTP 200..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:8000/health || echo "000")
            echo "Attempt ${i}/24: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              docker stop miru-backend-test
              docker rm miru-backend-test
              exit 0
            fi
            sleep 5
          done
          echo "::error::Container did not become healthy within 2 minutes."
          docker logs miru-backend-test
          docker stop miru-backend-test
          docker rm miru-backend-test
          exit 1
