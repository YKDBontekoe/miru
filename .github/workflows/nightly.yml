name: Nightly Build and Dependency Check

on:
  schedule:
    # Run every day at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: nightly-${{ github.workflow }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.13'
  FLUTTER_VERSION: '3.41.4'

jobs:
  # Backend dependency check
  backend-dependencies:
    name: Check Python Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Run security audit
        id: security_audit
        working-directory: ./backend
        run: |
          uv sync --all-extras
          echo "### Security Check (Safety)" >> $GITHUB_STEP_SUMMARY
          # safety check is used because safety scan requires an account/key in CI
          uv run safety check --policy-file .safety-policy.yml >> $GITHUB_STEP_SUMMARY || echo "Safety found issues"
          echo "### Security Check (pip-audit)" >> $GITHUB_STEP_SUMMARY
          # SEC(agent): review needed - ignoring GHSA-rf74-v2fm-23pw, GHSA-gfwx-w7gr-fvh7 (nltk via safety dev dependency) which have no current fixes
          uv run pip-audit --ignore-vuln GHSA-w8v5-vhqr-4h9v --ignore-vuln GHSA-rf74-v2fm-23pw --ignore-vuln GHSA-gfwx-w7gr-fvh7 --ignore-vuln GHSA-jm6w-m3j8-898g >> $GITHUB_STEP_SUMMARY || echo "pip-audit found issues"
        continue-on-error: true

      - name: Create issue if vulnerabilities found
        if: steps.security_audit.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          script: |
            const title = '🔒 Security: Vulnerabilities found in Python dependencies';
            const body = `## Security Alert

            Automated security scan found vulnerabilities in Python dependencies.

            **Run Date:** ${new Date().toISOString()}
            **Workflow:** ${{ github.workflow }}

            Please review the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

            ### Recommended Actions:
            1. Run \`safety check\` locally
            2. Update vulnerable dependencies
            3. Run tests to ensure compatibility
            4. Create a PR with the updates
            `;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security,dependencies,backend',
              state: 'open'
            });

            const alreadyOpen = existing.data.some(issue => issue.title === title);

            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                // jules-fix-pending routes this into the Jules automation loop.
                // Dependency bumps are mechanical tasks Jules handles well.
                labels: ['security', 'dependencies', 'backend', 'jules-fix-pending']
              });
            }

  # Flutter dependency check
  flutter-dependencies:
    name: Check Flutter Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Cache Pub packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            frontend/.dart_tool
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-pub-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Check for outdated dependencies
        working-directory: ./frontend
        run: |
          flutter pub get
          echo "### Outdated Dependencies" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          flutter pub outdated >> $GITHUB_STEP_SUMMARY || true

      - name: Check for discontinued packages
        id: discontinued
        working-directory: ./frontend
        run: |
          # flutter pub outdated --json reports discontinued packages correctly.
          # flutter pub publish --dry-run is NOT appropriate here — it validates
          # publishability to pub.dev, which fails for apps (not packages).
          flutter pub outdated --json | \
            python3 -c "
            import json, sys, os
            data = json.load(sys.stdin)
            discontinued = [
              p['package'] for p in data.get('packages', [])
              if p.get('discontinued', False)
            ]
            if discontinued:
              print('Discontinued packages found:', ', '.join(discontinued))
              with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
                f.write('discontinued=' + ','.join(discontinued) + '\n')
              sys.exit(1)
            else:
              print('No discontinued packages found.')
            "
        continue-on-error: true

      - name: Create issue for discontinued Flutter packages
        if: steps.discontinued.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          script: |
            const discontinued = '${{ steps.discontinued.outputs.discontinued }}';
            const packageList = discontinued.split(',').map(p => `- \`${p.trim()}\``).join('\n');
            const title = '📦 Flutter: Discontinued packages detected';
            const body = `## Discontinued Flutter Packages

            The nightly dependency check found discontinued packages that must be replaced.

            **Packages:**
            ${packageList}

            **Run Date:** ${new Date().toISOString()}
            **Workflow:** ${{ github.workflow }}

            ### Recommended Actions:
            1. Find actively maintained alternatives for each discontinued package
            2. Update \`frontend/pubspec.yaml\` with the replacement(s)
            3. Update any import statements and usage in \`frontend/lib/\`
            4. Run \`flutter pub get\` and \`flutter analyze\`
            5. Run \`make test-frontend\` to confirm nothing is broken
            6. Open a PR with the changes
            `;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'dependencies,frontend',
              state: 'open',
            });
            const alreadyOpen = existing.data.some(i => i.title === title);

            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                // jules-fix-pending routes this into the Jules automation loop.
                labels: ['dependencies', 'frontend', 'jules-fix-pending'],
              });
            }

  # Nightly build test
  nightly-build:
    name: Nightly Build Test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: web
          - os: macos-latest
            target: ios
          - os: windows-latest
            target: windows

    steps:
      - uses: actions/checkout@v6

      - name: Cache Pub packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            frontend/.dart_tool
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-pub-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop target
        if: matrix.target == 'windows'
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        working-directory: ./frontend
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Build Web
        if: matrix.target == 'web'
        working-directory: ./frontend
        run: flutter build web --release

      - name: Setup Xcode
        if: matrix.target == 'ios'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build iOS (no signing)
        if: matrix.target == 'ios'
        working-directory: ./frontend
        run: flutter build ios --release --no-codesign

      - name: Build Windows
        if: matrix.target == 'windows'
        working-directory: ./frontend
        run: flutter build windows --release

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = `🔥 Nightly Build Failed: ${{ matrix.target }}`;

            // De-duplicate: don't open a new issue if one is already open for
            // this target — repeated nightly failures would otherwise flood the
            // issue tracker with identical reports.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'bug,ci/cd',
              state: 'open',
            });
            if (existing.data.some(i => i.title === title)) {
              console.log(`Issue already open for "${title}" — skipping creation.`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `## Build Failure

            The nightly build for **${{ matrix.target }}** failed.

            **Run Date:** ${new Date().toISOString()}
            **OS:** ${{ matrix.os }}
            **Workflow:** ${{ github.workflow }}

            Please review the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
            `,
              labels: ['bug', 'ci/cd'],
            });

  # Backend build test
  backend-build-test:
    name: Backend Build Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: false
          tags: miru-backend:nightly
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run -d -p 8000:8000 --name miru-backend-test miru-backend:nightly
          echo "Waiting for /health to return HTTP 200..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:8000/health || echo "000")
            echo "Attempt ${i}/24: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              docker stop miru-backend-test
              docker rm miru-backend-test
              exit 0
            fi
            sleep 5
          done
          echo "::error::Container did not become healthy within 2 minutes."
          docker logs miru-backend-test
          docker stop miru-backend-test
          docker rm miru-backend-test
          exit 1
