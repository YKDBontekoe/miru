name: Flutter iOS CI/CD - Deploy to TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter-ios-deploy.yml'
  workflow_dispatch:
    inputs:
      build_number:
        description: 'Build Number (optional)'
        required: false
        type: string

env:
  FLUTTER_VERSION: '3.24.0'
  XCODE_VERSION: '15.2'
  IOS_DESTINATION: 'platform=iOS Simulator,name=iPhone 15 Pro'

jobs:
  test:
    name: Test iOS App
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build iOS for testing
        run: flutter build ios --simulator

      - name: Run iOS integration tests
        run: |
          xcodebuild test \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -destination '${{ env.IOS_DESTINATION }}' \
            -quiet
        continue-on-error: true

  build-and-deploy:
    name: Build and Deploy to TestFlight
    runs-on: macos-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment:
      name: production-ios

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Setup signing
        env:
          IOS_P12_CERTIFICATE: ${{ secrets.IOS_P12_CERTIFICATE }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          # Create temporary keychain
          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate
          echo "$IOS_P12_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$IOS_KEYCHAIN_PASSWORD" build.keychain

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Get build number
        id: build_number
        run: |
          if [ -n "${{ github.event.inputs.build_number }}" ]; then
            echo "number=${{ github.event.inputs.build_number }}" >> $GITHUB_OUTPUT
          else
            # Generate build number from commit count
            BUILD_NUMBER=$(git rev-list --count HEAD)
            echo "number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          fi

      - name: Update version and build number
        run: |
          # Get version from pubspec.yaml
          VERSION=$(grep "version:" pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          BUILD_NUMBER=${{ steps.build_number.outputs.number }}

          # Update iOS build number
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" ios/Runner/Info.plist

      - name: Build iOS app
        run: |
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist \
            --dart-define=API_URL=${{ secrets.BACKEND_API_URL }} \
            --build-number=${{ steps.build_number.outputs.number }}

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: frontend/build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APPLE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPLE_API_PRIVATE_KEY }}

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: frontend/build/ios/ipa/*.ipa
          retention-days: 7
