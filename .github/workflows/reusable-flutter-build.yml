name: Reusable - Flutter Build

on:
  workflow_call:
    inputs:
      flutter-version:
        description: 'Flutter version to use'
        type: string
        default: '3.41.4'
      target:
        description: 'Build target: web | android | ios'
        type: string
        required: true
      working-directory:
        description: 'Working directory for flutter commands'
        type: string
        default: './frontend'
      runs-on:
        description: 'Runner OS'
        type: string
        default: 'ubuntu-latest'
      artifact-name:
        description: 'Name for the uploaded build artifact'
        type: string
        required: true
      artifact-path:
        description: 'Path to upload as artifact (relative to working-directory)'
        type: string
        required: true
    secrets:
      SENTRY_DSN:
        required: false
      SUPABASE_URL:
        required: false
      SUPABASE_ANON_KEY:
        required: false
      BACKEND_URL:
        required: false

jobs:
  build:
    name: Build (${{ inputs.target }})
    runs-on: ${{ inputs.runs-on }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ inputs.working-directory }}/.dart_tool
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-pub-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          channel: 'stable'
          cache: true

      - name: Install dependencies and generate code
        uses: ./.github/actions/flutter-generate-code
        with:
          working-directory: ${{ inputs.working-directory }}

      # Write dart-defines to a file so secrets are never passed as CLI arguments
      # (CLI args appear in process lists and runner shell history)
      - name: Write dart-defines file
        shell: bash
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          cat > dart_defines.json <<EOF
          {
            "SENTRY_DSN": "${SENTRY_DSN}",
            "SUPABASE_URL": "${SUPABASE_URL}",
            "SUPABASE_ANON_KEY": "${SUPABASE_ANON_KEY}",
            "BACKEND_URL": "${BACKEND_URL}/api/v1"
          }
          EOF

      - name: Setup Xcode
        if: inputs.target == 'ios'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build Web
        if: inputs.target == 'web'
        run: flutter build web --release --dart-define-from-file=dart_defines.json

      - name: Build APK
        if: inputs.target == 'android'
        run: flutter build apk --release --dart-define-from-file=dart_defines.json

      - name: Build App Bundle
        if: inputs.target == 'android'
        run: flutter build appbundle --release --dart-define-from-file=dart_defines.json

      - name: Build iOS
        if: inputs.target == 'ios'
        run: flutter build ios --release --no-codesign --dart-define-from-file=dart_defines.json

      - name: Remove dart-defines file
        if: always()
        run: rm -f dart_defines.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.working-directory }}/${{ inputs.artifact-path }}
