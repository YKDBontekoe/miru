name: iOS EAS Build & Publish

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ios-eas-build.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-eas-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eas-update:
    name: Publish EAS update (Expo Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Publish update to development channel
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_KEY }}
          EXPO_PUBLIC_API_URL: ${{ vars.PRODUCTION_URL }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          eas update \
            --branch development \
            --message "$COMMIT_MESSAGE" \
            --non-interactive
