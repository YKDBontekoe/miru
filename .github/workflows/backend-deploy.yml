name: Backend CI/CD - Deploy to Azure Container Apps

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'supabase/migrations/**'
      - '.github/workflows/backend-deploy.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'supabase/migrations/**'

permissions:
  contents: read

concurrency:
  group: backend-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.13'
  CONTAINER_APP_NAME: aca-miru
  RESOURCE_GROUP: rg-miru
  IMAGE_NAME: miru-backend
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test Backend
    uses: ./.github/workflows/reusable-python-setup.yml
    with:
      python-version: '3.13'
      working-directory: './backend'
      run-tests: true
      run-lint: false # Linting is already covered in pr-checks
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      DATABASE_URL: 'postgresql://test:test@localhost:5432/test'

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write
      id-token: write    # Cosign keyless signing via GitHub OIDC
      attestations: write # Build provenance attestation stored in GHCR
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v6

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Registry cache persists across runners and never expires; GHA cache
          # is kept as a fast fallback for the first push after a cache miss.
          cache-from: |
            type=registry,ref=ghcr.io/${{ env.OWNER }}/${{ env.IMAGE_NAME }}:buildcache
            type=gha
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64

      - name: Set image tag output
        id: image-tag
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          # Use the expression-provided SHA so this step never needs a git command.
          # git rev-parse can silently fail on shallow clones; ${{ github.sha }} is always set.
          SHORT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          BRANCH=$(echo '${{ github.ref_name }}' | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')
          TAG="${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}:${BRANCH}-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      # ── Supply-chain security ────────────────────────────────────────────────
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker image (keyless)
        # Keyless signing uses the GitHub Actions OIDC token — no long-lived key
        # is stored anywhere. The signature and transparency-log entry are written
        # to Rekor and can be verified by anyone with cosign + the workflow URL.
        run: cosign sign --yes "${{ steps.image-tag.outputs.tag }}"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.image-tag.outputs.tag }}
          artifact-name: sbom.spdx.json
          output-file: sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ env.OWNER }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  scan:
    name: Scan Docker Image for Vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Single Trivy invocation: produce SARIF for the Security tab and fail on
      # unfixed CRITICAL CVEs. Running two separate scans on the same image wastes
      # time and double-counts billable minutes.
      - name: Run Trivy vulnerability scanner
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ needs.build.outputs.image-tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-container'

  # migrate runs in parallel with scan — schema changes are independent of the
  # Docker image. Blocking migrations on a CVE scan means a typo fix in a migration
  # file can't reach the database until a third-party CVE is patched.
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: |
          PROJECT_REF=${{ github.ref == 'refs/heads/main' && secrets.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF_STAGING }}
          supabase link --project-ref "$PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify migrations
        run: supabase migration list
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # migrate and scan/build must both succeed before deploying. migrate already
    # depends on test, and scan already depends on build.
    # build is explicitly listed because we need to access its output image-tag.
    needs: [migrate, scan, build]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    permissions:
      contents: read
      packages: read
      id-token: write  # Required for Cosign signature verification
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ vars.SENTRY_ORG }}
      SENTRY_PROJECT_BACKEND: ${{ vars.SENTRY_PROJECT_BACKEND }}

    steps:
      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "$PRODUCTION_DATABASE_URL" ]           && MISSING="$MISSING PRODUCTION_DATABASE_URL"
          [ -z "$PRODUCTION_SUPABASE_URL" ]           && MISSING="$MISSING PRODUCTION_SUPABASE_URL"
          [ -z "$PRODUCTION_SUPABASE_KEY" ]           && MISSING="$MISSING PRODUCTION_SUPABASE_KEY"
          [ -z "$PRODUCTION_SUPABASE_SERVICE_ROLE_KEY" ] && MISSING="$MISSING PRODUCTION_SUPABASE_SERVICE_ROLE_KEY"
          [ -z "$PRODUCTION_SUPABASE_JWT_SECRET" ]    && MISSING="$MISSING PRODUCTION_SUPABASE_JWT_SECRET"
          [ -z "$OPENROUTER_API_KEY" ]                && MISSING="$MISSING OPENROUTER_API_KEY"
          [ -z "$DEFAULT_CHAT_MODEL" ]                && MISSING="$MISSING DEFAULT_CHAT_MODEL"
          [ -z "$EMBEDDING_MODEL" ]                   && MISSING="$MISSING EMBEDDING_MODEL"
          [ -z "$SECRET_KEY" ]                        && MISSING="$MISSING SECRET_KEY"
          [ -z "$WEBAUTHN_RP_ID" ]                    && MISSING="$MISSING WEBAUTHN_RP_ID"
          [ -z "$WEBAUTHN_EXPECTED_ORIGIN" ]          && MISSING="$MISSING WEBAUTHN_EXPECTED_ORIGIN"
          [ -z "$TAVILY_API_KEY" ]                    && MISSING="$MISSING TAVILY_API_KEY"
          # SENTRY_DSN is optional, we don't fail if it's missing, but we log its presence.
          if [ -n "$SENTRY_DSN" ]; then
            echo "Sentry error tracking is enabled."
          else
            echo "Sentry DSN not found; error tracking will be disabled."
          fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            echo "Set these in the 'production' GitHub environment before deploying."
            exit 1
          fi
          # Validate SUPABASE_URL is an HTTP URL, not a PostgreSQL connection string.
          # The Supabase client requires: https://<project-ref>.supabase.co
          if [[ "$PRODUCTION_SUPABASE_URL" == postgresql://* ]] || [[ "$PRODUCTION_SUPABASE_URL" == postgres://* ]]; then
            echo "::error::PRODUCTION_SUPABASE_URL must be the Supabase HTTP project URL (https://<ref>.supabase.co), not a PostgreSQL connection string."
            exit 1
          fi
          echo "All required secrets are present and valid."
        env:
          PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          PRODUCTION_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          PRODUCTION_SUPABASE_KEY: ${{ secrets.PRODUCTION_SUPABASE_KEY }}
          PRODUCTION_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PRODUCTION_SUPABASE_SERVICE_ROLE_KEY }}
          PRODUCTION_SUPABASE_JWT_SECRET: ${{ secrets.PRODUCTION_SUPABASE_JWT_SECRET }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEFAULT_CHAT_MODEL: ${{ secrets.DEFAULT_CHAT_MODEL }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          WEBAUTHN_RP_ID: ${{ secrets.WEBAUTHN_RP_ID }}
          WEBAUTHN_EXPECTED_ORIGIN: ${{ secrets.WEBAUTHN_EXPECTED_ORIGIN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify Docker image signature
        # Confirm the image was signed by THIS workflow before deploying.
        # Prevents a tampered or unrelated image from reaching production.
        run: |
          cosign verify \
            --certificate-identity-regexp \
              "https://github.com/${{ github.repository }}/.github/workflows/backend-deploy.yml@.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ needs.build.outputs.image-tag }}"

      - name: Ensure ingress target port is 8000
        run: |
          # --target-port is an ingress property, not a containerapp update flag.
          # This step is idempotent -- it only applies a change when the port drifts.
          az containerapp ingress update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --target-port 8000

      - name: Set Sentry release identifier
        id: sentry-release
        run: echo "value=miru-backend@$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Capture active revision for rollback
        id: prev-revision
        run: |
          PREV=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "sort_by([?properties.active].{name:name,created:properties.createdTime}, &created) | [-1].name" \
            --output tsv)
          echo "name=${PREV}" >> $GITHUB_OUTPUT
          echo "Active revision before deploy: ${PREV}"

      - name: Deploy to Azure Container Apps
        id: deploy
        env:
          SECRET_PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          SECRET_PRODUCTION_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          SECRET_PRODUCTION_SUPABASE_KEY: ${{ secrets.PRODUCTION_SUPABASE_KEY }}
          SECRET_PRODUCTION_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PRODUCTION_SUPABASE_SERVICE_ROLE_KEY }}
          SECRET_PRODUCTION_SUPABASE_JWT_SECRET: ${{ secrets.PRODUCTION_SUPABASE_JWT_SECRET }}
          SECRET_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SECRET_DEFAULT_CHAT_MODEL: ${{ secrets.DEFAULT_CHAT_MODEL }}
          SECRET_EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          SECRET_SECRET_KEY: ${{ secrets.SECRET_KEY }}
          SECRET_WEBAUTHN_RP_ID: ${{ secrets.WEBAUTHN_RP_ID }}
          SECRET_WEBAUTHN_RP_NAME: ${{ secrets.WEBAUTHN_RP_NAME }}
          SECRET_WEBAUTHN_EXPECTED_ORIGIN: ${{ secrets.WEBAUTHN_EXPECTED_ORIGIN }}
          SECRET_CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          SECRET_TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SECRET_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SECRET_AZURE_NOTIFICATION_HUB_NAME: ${{ secrets.AZURE_NOTIFICATION_HUB_NAME }}
          SECRET_AZURE_NOTIFICATION_HUB_CONNECTION_STRING: ${{ secrets.AZURE_NOTIFICATION_HUB_CONNECTION_STRING }}
        run: |
          # PRODUCTION_SUPABASE_URL must be the Supabase HTTP project URL:
          #   https://<project-ref>.supabase.co
          # NOT the PostgreSQL connection string (postgresql://...).

          # Define secrets (key-value pairs)
          # Secret names must be lower-case alphanumeric characters and dashes only
          SECRETS=(
            "database-url=${SECRET_PRODUCTION_DATABASE_URL}"
            "supabase-url=${SECRET_PRODUCTION_SUPABASE_URL}"
            "supabase-key=${SECRET_PRODUCTION_SUPABASE_KEY}"
            "supabase-service-role-key=${SECRET_PRODUCTION_SUPABASE_SERVICE_ROLE_KEY}"
            "supabase-jwt-secret=${SECRET_PRODUCTION_SUPABASE_JWT_SECRET}"
            "openrouter-api-key=${SECRET_OPENROUTER_API_KEY}"
            "default-chat-model=${SECRET_DEFAULT_CHAT_MODEL}"
            "embedding-model=${SECRET_EMBEDDING_MODEL}"
            "secret-key=${SECRET_SECRET_KEY}"
            "webauthn-rp-id=${SECRET_WEBAUTHN_RP_ID}"
            "webauthn-rp-name=${SECRET_WEBAUTHN_RP_NAME}"
            "webauthn-expected-origin=${SECRET_WEBAUTHN_EXPECTED_ORIGIN}"
            "cors-allowed-origins=${SECRET_CORS_ALLOWED_ORIGINS}"
            "tavily-api-key=${SECRET_TAVILY_API_KEY}"
            "sentry-dsn=${SECRET_SENTRY_DSN}"
            "azure-notification-hub-name=${SECRET_AZURE_NOTIFICATION_HUB_NAME}"
            "azure-notification-hub-connection-string=${SECRET_AZURE_NOTIFICATION_HUB_CONNECTION_STRING}"
          )

          # Prepare arrays to hold valid secrets and env vars
          FILTERED_SECRETS=()
          FILTERED_ENV_VARS=()

          # Process secrets
          for secret in "${SECRETS[@]}"; do
            key="${secret%%=*}"
            val="${secret#*=}"
            if [ -n "$val" ]; then
              FILTERED_SECRETS+=("$key=$val")
              # Add secretref to environment variables
              # We map the UPPER_CASE env var name to the lowercase-dashed secret name
              env_key=$(echo "$key" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
              FILTERED_ENV_VARS+=("$env_key=secretref:$key")
            fi
          done

          # Add plaintext env vars
          FILTERED_ENV_VARS+=("SENTRY_RELEASE=${{ steps.sentry-release.outputs.value }}")
          FILTERED_ENV_VARS+=("SENTRY_ENVIRONMENT=production")

          # Update the Azure Container App
          # Note: these commands only add or update entries; they do NOT remove deprecated keys.
          # If secrets or environment variables are removed from this workflow, they must
          # be manually cleaned up via the Azure CLI or Portal to avoid leaving stale data.
          # (e.g., `az containerapp secret remove` and `az containerapp update --remove-env-vars`)

          # az containerapp update does not support --secrets; use secret set instead.
          if [ ${#FILTERED_SECRETS[@]} -gt 0 ]; then
            az containerapp secret set \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --secrets "${FILTERED_SECRETS[@]}"
          fi

          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
          if [ -z "$IMAGE_TAG" ]; then
            echo "::error::needs.build.outputs.image-tag is empty — the build job did not set its output correctly."
            exit 1
          fi

          # --set-env-vars adds/updates without replacing unrelated env vars.
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image "$IMAGE_TAG" \
            --set-env-vars "${FILTERED_ENV_VARS[@]}"

      - name: Wait for new revision to become active
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "Deployed to: https://${APP_URL}"

          # az containerapp update returns once the ARM operation completes, not
          # once the new revision is healthy and serving traffic. Poll the latest
          # revision's provisioning state before hitting /health so we don't
          # accidentally verify the old revision.
          echo "Waiting for latest revision to reach Running state..."
          for i in $(seq 1 18); do
            REVISION=$(az containerapp revision list \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --query "sort_by([].{name:name,created:properties.createdTime}, &created) | [-1].name" \
              --output tsv)
            STATE=$(az containerapp revision show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --revision "$REVISION" \
              --query "properties.runningState" \
              --output tsv)
            echo "Attempt ${i}/18: revision ${REVISION} is ${STATE}"
            # RunningAtMaxScale means the revision is healthy but has hit its
            # replica ceiling — treat it the same as Running.
            if [ "$STATE" = "Running" ] || [ "$STATE" = "RunningAtMaxScale" ]; then
              echo "Revision is active."
              break
            fi
            sleep 10
          done

          echo "Waiting for /health to return HTTP 200..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "https://${APP_URL}/health" || echo "000")
            echo "Attempt ${i}/24: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "Deployment verified."
              exit 0
            fi
            sleep 10
          done

          echo "::error::App did not become healthy within 4 minutes."
          PREV="${{ steps.prev-revision.outputs.name }}"
          if [ -n "$PREV" ]; then
            echo "::warning::Rolling back traffic to ${PREV}..."
            az containerapp ingress traffic set \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --revision-weight "${PREV}=100" || true
            echo "Rollback complete — all traffic redirected to ${PREV}."
          fi
          exit 1

      - name: Run post-deploy smoke tests
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          FAILURES=0

          check() {
            local label="$1" url="$2" expected="$3" fatal="$4"
            local status
            status=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$url" || echo "000")
            echo "${label} → HTTP ${status}"
            if [ "$status" != "$expected" ]; then
              [ "$fatal" = "true" ] \
                && { echo "::error::${label} returned ${status} (expected ${expected})"; FAILURES=$((FAILURES+1)); } \
                || echo "::warning::${label} returned ${status} (expected ${expected})"
            fi
          }

          check "/health"       "https://${APP_URL}/health"       "200" "true"
          check "/docs"         "https://${APP_URL}/docs"         "200" "false"
          check "/openapi.json" "https://${APP_URL}/openapi.json" "200" "true"

          [ "$FAILURES" -gt 0 ] && { echo "::error::${FAILURES} smoke test(s) failed."; exit 1; }
          echo "All smoke tests passed."

      - name: Notify Sentry of backend deploy
        if: env.SENTRY_AUTH_TOKEN != '' && env.SENTRY_ORG != '' && env.SENTRY_PROJECT_BACKEND != ''
        run: |
          curl -sL https://sentry.io/get-cli/ | bash
          sentry-cli releases deploys "${{ steps.sentry-release.outputs.value }}" new \
            --env production \
            --org "${{ env.SENTRY_ORG }}" \
            --project "${{ env.SENTRY_PROJECT_BACKEND }}" \
            || echo "Sentry deploy notification failed — continuing."

      - name: Write deployment summary
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS="${{ job.status }}"
          [ "$STATUS" = "success" ] && EMOJI="✅" || EMOJI="❌"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          NEW_REVISION=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "sort_by([].{name:name,created:properties.createdTime}, &created) | [-1].name" \
            --output tsv 2>/dev/null || echo "unknown")

          # DORA: deployment frequency — count successful backend deploys to main in the last 7 days.
          WEEK_AGO=$(date -u -d '7 days ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
                  || date -u -v-7d    +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
                  || echo "")
          if [ -n "$WEEK_AGO" ]; then
            DEPLOYS_7D=$(gh api \
              "repos/${{ github.repository }}/actions/workflows/backend-deploy.yml/runs?per_page=100&status=success&branch=main" \
              --jq "[.workflow_runs[] | select(.created_at > \"${WEEK_AGO}\")] | length" 2>/dev/null || echo "?")
          else
            DEPLOYS_7D="?"
          fi

          {
            echo "## ${EMOJI} Production Deployment"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Status** | ${EMOJI} ${STATUS^} |"
            echo "| **Image** | \`${{ needs.build.outputs.image-tag }}\` |"
            echo "| **Revision** | \`${NEW_REVISION}\` |"
            if [ "$STATUS" != "success" ]; then
              echo "| **Rolled back to** | \`${{ steps.prev-revision.outputs.name }}\` |"
            fi
            echo "| **Commit** | [\`${SHORT_SHA}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |"
            echo "| **Actor** | @${{ github.actor }} |"
            echo "| **URL** | ${{ vars.PRODUCTION_URL }} |"
            echo "| **Sentry release** | \`${{ steps.sentry-release.outputs.value }}\` |"
            echo ""
            echo "### 📊 DORA"
            echo "| Metric | Value |"
            echo "|---|---|"
            echo "| **Deploy frequency (7d)** | ${DEPLOYS_7D} deploys |"
            echo ""
            echo "> [View full run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> "$GITHUB_STEP_SUMMARY"

