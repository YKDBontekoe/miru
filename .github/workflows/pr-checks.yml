name: PR Checks and Linting

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'supabase/**'
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      workflows: ${{ steps.filter.outputs.workflows }}

    steps:
      - uses: actions/checkout@v6
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'supabase/migrations/**'
            frontend:
              - 'frontend/**'
            workflows:
              - '.github/workflows/**'

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend Security & Quality Gates
  # ─────────────────────────────────────────────────────────────────────────────

  frontend-lockfile-validation:
    name: Frontend Lockfile Validation
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate lockfile
        working-directory: ./frontend
        run: |
          npm install --package-lock-only
          if ! git diff --quiet package-lock.json; then
            echo "::error::package-lock.json is out of sync with package.json. Run 'npm install' locally and commit the changes."
            exit 1
          fi
          echo "Lockfile validation passed."

  frontend-npm-audit:
    name: Frontend Security Audit
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run npm audit
        working-directory: ./frontend
        continue-on-error: true
        run: |
          echo "## NPM Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=moderate --production 2>&1 | tee audit-output.txt || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat audit-output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────────────────────────────────
  # Backend Checks
  # ─────────────────────────────────────────────────────────────────────────────

  backend-checks:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true'
    uses: ./.github/workflows/reusable-python-setup.yml
    with:
      python-version: '3.13'
      working-directory: './backend'
      run-tests: true
      run-lint: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  postman-coverage-check:
    name: Enforce Postman Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check Postman Coverage
        run: python3 backend/scripts/enforce_postman_tests.py

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend Checks
  # ─────────────────────────────────────────────────────────────────────────────

  frontend-checks:
    name: Frontend
    needs: [changes, frontend-lockfile-validation]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true'
    uses: ./.github/workflows/reusable-frontend-setup.yml
    with:
      node-version: '20'
      working-directory: './frontend'
      run-tests: true
      run-lint: true
      run-format-check: true
      upload-coverage: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_KEY }}

  frontend-web-build:
    name: Frontend Web Build
    needs: [changes, frontend-checks]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: ./frontend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('./frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_KEY }}
        run: npx expo export -p web

      - name: Analyze bundle size
        run: |
          echo "## Bundle Size Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL_SIZE=$(du -sb ./dist | cut -f1)
          TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)
          echo "**Total Bundle Size:** ${TOTAL_SIZE_MB} MB" >> $GITHUB_STEP_SUMMARY

          if (( $(echo "$TOTAL_SIZE_MB > 10" | bc -l) )); then
            echo "::warning::Bundle size (${TOTAL_SIZE_MB} MB) exceeds 10 MB threshold."
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-pr-build
          path: ./frontend/dist
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Security & Workflow Checks
  # ─────────────────────────────────────────────────────────────────────────────

  security-audit:
    name: Security Audit
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Run security audit
        continue-on-error: true
        run: |
          cd backend
          uv sync --all-extras
          uv run safety check --policy-file .safety-policy.yml
          uv run pip-audit --ignore-vuln GHSA-w8v5-vhqr-4h9v --ignore-vuln GHSA-rf74-v2fm-23pw --ignore-vuln GHSA-gfwx-w7gr-fvh7 --ignore-vuln GHSA-jm6w-m3j8-898g

  actionlint:
    name: Lint Workflows
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.11

  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          CHANGED_LINES=$(git diff --numstat origin/${{ github.base_ref }}...HEAD \
            | awk '{add+=$1; del+=$2} END {print add+del}')
          echo "Total lines changed: ${CHANGED_LINES}"
          if [ "${CHANGED_LINES}" -gt 1000 ]; then
            echo "::warning::PR is large (${CHANGED_LINES} lines changed). Consider splitting into smaller PRs."
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # PR Backend Preview Deployment
  # ─────────────────────────────────────────────────────────────────────────────

  pr-backend-build:
    name: Build PR Backend Image
    needs: [changes, backend-checks]
    if: needs.changes.outputs.backend == 'true' && needs.backend-checks.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v6

      - name: Compute image tag
        id: image-tag
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          TAG="ghcr.io/${OWNER}/miru-backend:pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "owner=${OWNER}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ steps.image-tag.outputs.tag }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ steps.image-tag.outputs.owner }}/miru-backend:buildcache
            type=gha
          platforms: linux/amd64

  pr-backend-deploy:
    name: Deploy and Smoke-test PR Backend
    needs: [pr-backend-build]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
      id-token: write
    environment:
      name: pr-preview
      url: ${{ steps.app-url.outputs.url }}
    env:
      PR_APP: ${{ vars.PR_CONTAINER_APP_NAME || 'aca-miru-pr' }}
      PR_RG:  ${{ vars.PR_RESOURCE_GROUP    || 'rg-miru' }}

    steps:
      - uses: actions/checkout@v6

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Upgrade containerapp CLI extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Deploy image to PR container app
        run: |
          IMAGE_TAG="${{ needs.pr-backend-build.outputs.image-tag }}"
          [ -z "$IMAGE_TAG" ] && { echo "::error::image-tag is empty"; exit 1; }

          ENV_VARS=(
            "DATABASE_URL=secretref:database-url"
            "SUPABASE_URL=secretref:supabase-url"
            "SUPABASE_KEY=secretref:supabase-key"
            "SUPABASE_SERVICE_ROLE_KEY=secretref:supabase-service-role-key"
            "SUPABASE_JWT_SECRET=secretref:supabase-jwt-secret"
            "OPENROUTER_API_KEY=secretref:openrouter-api-key"
            "DEFAULT_CHAT_MODEL=secretref:default-chat-model"
            "EMBEDDING_MODEL=secretref:embedding-model"
            "SECRET_KEY=secretref:secret-key"
            "WEBAUTHN_RP_ID=secretref:webauthn-rp-id"
            "WEBAUTHN_RP_NAME=secretref:webauthn-rp-name"
            "WEBAUTHN_EXPECTED_ORIGIN=secretref:webauthn-expected-origin"
            "CORS_ALLOWED_ORIGINS=secretref:cors-allowed-origins"
            "TAVILY_API_KEY=secretref:tavily-api-key"
            "SENTRY_DSN=secretref:sentry-dsn"
            "AZURE_NOTIFICATION_HUB_NAME=secretref:azure-notification-hub-name"
            "AZURE_NOTIFICATION_HUB_CONNECTION_STRING=secretref:azure-notification-hub-connection-string"
            "SENTRY_ENVIRONMENT=pr-preview"
          )

          NEW_REVISION=$(az containerapp update \
            --name "${{ env.PR_APP }}" \
            --resource-group "${{ env.PR_RG }}" \
            --image "$IMAGE_TAG" \
            --revision-suffix "pr-${{ github.event.pull_request.number }}-${{ github.run_id }}" \
            --target-label "pr-${{ github.event.pull_request.number }}" \
            --set-env-vars "${ENV_VARS[@]}" \
            --query "properties.latestRevisionName" \
            --output tsv)

          echo "Created revision: $NEW_REVISION with label pr-${{ github.event.pull_request.number }}"

      - name: Get app URL
        id: app-url
        run: |
          FQDN=$(az containerapp show \
            --name "${{ env.PR_APP }}" \
            --resource-group "${{ env.PR_RG }}" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          APP_NAME="${{ env.PR_APP }}"
          ENVIRONMENT_DOMAIN="${FQDN#"$APP_NAME".}"
          LABEL="pr-${{ github.event.pull_request.number }}"
          TEST_URL="https://${APP_NAME}---${LABEL}.${ENVIRONMENT_DOMAIN}"

          echo "url=$TEST_URL" >> "$GITHUB_OUTPUT"
          echo "Testing PR URL: $TEST_URL"

      - name: Wait for PR deployment to become healthy
        run: |
          APP_URL="${{ steps.app-url.outputs.url }}"

          for i in $(seq 1 18); do
            REVISION=$(az containerapp revision list \
              --name "${{ env.PR_APP }}" \
              --resource-group "${{ env.PR_RG }}" \
              --query "[?starts_with(name, '${{ env.PR_APP }}--pr-${{ github.event.pull_request.number }}-')].name | [-1]" \
              --output tsv)
            STATE=$(az containerapp revision show \
              --name "${{ env.PR_APP }}" \
              --resource-group "${{ env.PR_RG }}" \
              --revision "$REVISION" \
              --query "properties.runningState" --output tsv)
            echo "Attempt ${i}/18: ${REVISION} is ${STATE}"
            if [ "$STATE" = "Running" ] || [ "$STATE" = "RunningAtMaxScale" ]; then
              break
            fi
            sleep 10
          done

          for i in $(seq 1 5); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 --max-time 90 \
              "${APP_URL}/health" || echo "000")
            echo "Attempt ${i}/5: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "PR deployment is healthy."
              exit 0
            fi
            [ "$i" -lt 5 ] && sleep 5
          done
          echo "::error::PR deployment did not become healthy within the expected window."
          exit 1

      - name: Run smoke tests
        run: |
          APP_URL="${{ steps.app-url.outputs.url }}"
          FAILURES=0

          check() {
            local label="$1" url="$2" expected="$3" fatal="$4"
            local status
            status=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 10 "$url" || echo "000")
            echo "${label} → HTTP ${status}"
            if [ "$status" != "$expected" ]; then
              [ "$fatal" = "true" ] \
                && { echo "::error::${label} returned ${status} (expected ${expected})"; FAILURES=$((FAILURES+1)); } \
                || echo "::warning::${label} returned ${status} (expected ${expected})"
            fi
          }

          check "/health"       "${APP_URL}/health"       "200" "true"
          check "/docs"         "${APP_URL}/docs"         "200" "false"
          check "/openapi.json" "${APP_URL}/openapi.json" "200" "true"

          [ "$FAILURES" -gt 0 ] && { echo "::error::${FAILURES} smoke test(s) failed."; exit 1; }
          echo "All smoke tests passed."

      - name: Run Postman integration tests
        run: |
          npm install -g newman
          PIDS=()
          for collection in backend/tests/postman/*.json; do
            echo "Starting Postman Collection: $collection"
            newman run "$collection" --env-var baseUrl=${{ steps.app-url.outputs.url }} &
            PIDS+=($!)
          done

          FAILURES=0
          for pid in "${PIDS[@]}"; do
            wait "$pid" || FAILURES=$((FAILURES+1))
          done

          if [ "$FAILURES" -gt 0 ]; then
            echo "::error::${FAILURES} Postman collection(s) failed."
            exit 1
          fi
          echo "All Postman collections passed."
