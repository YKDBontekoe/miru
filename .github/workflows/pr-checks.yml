name: PR Checks and Linting

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'supabase/**'
      - '.github/workflows/**'

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      workflows: ${{ steps.filter.outputs.workflows }}

    steps:
      - uses: actions/checkout@v6
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'supabase/migrations/**'
            frontend:
              - 'frontend/**'
            workflows:
              - '.github/workflows/**'

  # ── Backend Checks ──────────────────────────────────────────────────────────

  backend-unit-tests:
    name: Backend Unit Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true'
    uses: ./.github/workflows/reusable-python-setup.yml
    with:
      python-version: '3.13'
      working-directory: './backend'
      run-tests: true
      run-lint: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  pr-backend-build:
    name: Build PR Backend Image
    needs: [changes, backend-unit-tests]
    if: needs.changes.outputs.backend == 'true' && needs.backend-unit-tests.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - name: Compute image tag
        id: image-tag
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          TAG="ghcr.io/${OWNER}/miru-backend:pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ steps.image-tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  local-integration-tests:
    name: Integration
    needs: [pr-backend-build]
    uses: ./.github/workflows/reusable-backend-integration.yml
    with:
      python-version: '3.13'
      image-tag: ${{ needs.pr-backend-build.outputs.image-tag }}

  pr-backend-preview:
    name: Preview
    needs: [pr-backend-build, local-integration-tests]
    uses: ./.github/workflows/reusable-backend-preview.yml
    with:
      image-tag: ${{ needs.pr-backend-build.outputs.image-tag }}
      pr-number: ${{ github.event.pull_request.number }}
    secrets:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}

  # ── Frontend Checks ──────────────────────────────────────────────────────────

  frontend-checks:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true'
    uses: ./.github/workflows/reusable-frontend-setup.yml
    with:
      node-version: '20'
      working-directory: './frontend'
      run-tests: true
      run-lint: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_KEY }}

  # ── Global Checks ──────────────────────────────────────────────────────────

  security-audit:
    name: Security Audit
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Run audit
        run: |
          cd backend
          uv sync
          uv run pip-audit

  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check
        run: |
          CHANGED_LINES=$(git diff --numstat origin/${{ github.base_ref }}...HEAD | awk '{add+=$1; del+=$2} END {print add+del}')
          if [ "${CHANGED_LINES}" -gt 1000 ]; then echo "::warning::PR is large"; fi
