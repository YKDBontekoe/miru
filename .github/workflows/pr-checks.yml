name: PR Checks and Linting

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  FLUTTER_VERSION: '3.41.0'

jobs:
  # Backend checks — only runs when backend files change
  backend-checks:
    name: Backend PR Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    # Only run when backend files are touched (or on pushes to main/develop without path filter)
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'backend') ||
      true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            ./backend/requirements.txt
            ./backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Ruff linter
        run: ruff check --output-format=github .

      - name: Run Ruff formatter check
        run: ruff format --check .

      - name: Run isort check
        run: isort --check-only --diff .

      - name: Run MyPy type checker
        run: mypy --ignore-missing-imports app/

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          SUPABASE_URL: http://localhost:54321
          SUPABASE_KEY: test-key
          OPENROUTER_API_KEY: test-key
        run: pytest -v --tb=short

  # Flutter checks — only runs when frontend files change
  flutter-checks:
    name: Flutter PR Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: false

      - name: Clean and install dependencies
        run: |
          flutter clean
          flutter pub get --verbose 2>&1 | tail -100

      - name: Verify project structure
        run: |
          pwd
          ls -la
          ls -la lib/
          cat pubspec.yaml | head -5
          git status

      - name: Verify dependencies
        run: |
          ls -la .dart_tool/ || echo "No .dart_tool directory"
          if [ -f .dart_tool/package_config.json ]; then
            cat .dart_tool/package_config.json | grep -A5 '"miru"' || echo "miru package not found in config"
          fi
          flutter pub deps

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

      - name: Check for outdated dependencies
        run: flutter pub outdated
        continue-on-error: true

  # Flutter web build — only on PRs touching frontend/**
  flutter-web-build-check:
    name: Flutter Web Build Check
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      (
        startsWith(github.event.pull_request.head.ref, 'feature/') ||
        github.base_ref == 'main' ||
        github.base_ref == 'develop'
      )
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web app (verify build)
        run: flutter build web --release

  # Security scan for dependencies
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python security audit
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety and pip-audit
        run: |
          pip install safety pip-audit

      - name: Run safety check on backend
        working-directory: ./backend
        run: safety check -r requirements.txt
        continue-on-error: true

      - name: Run pip-audit on backend
        working-directory: ./backend
        run: pip-audit -r requirements.txt
        continue-on-error: true

      # Dart security audit (via pub outdated)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Check Flutter dependencies
        working-directory: ./frontend
        run: flutter pub audit
        continue-on-error: true

  # PR size check
  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          # Get the number of changed lines
          CHANGED_LINES=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD | awk '{print $4 + $6}')
          echo "Changed lines: $CHANGED_LINES"

          if [ "$CHANGED_LINES" -gt 1000 ]; then
            echo "::warning::PR is large ($CHANGED_LINES lines changed). Consider breaking it into smaller PRs."
          fi

          # Check for large files
          LARGE_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | while read file; do
            if [ -f "$file" ]; then
              SIZE=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 1048576 ]; then
                echo "$file ($((SIZE / 1024))KB)"
              fi
            fi
          done)

          if [ -n "$LARGE_FILES" ]; then
            echo "::warning::Large files detected:"
            echo "$LARGE_FILES"
          fi
