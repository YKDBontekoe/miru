name: PR Checks and Linting

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'supabase/**'
      - '.github/workflows/**'

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      workflows: ${{ steps.filter.outputs.workflows }}

    steps:
      - uses: actions/checkout@v6
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'supabase/migrations/**'
            frontend:
              - 'frontend/**'
            workflows:
              - '.github/workflows/**'

  backend-checks:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true'
    uses: ./.github/workflows/reusable-python-setup.yml
    with:
      python-version: '3.13'
      working-directory: './backend'
      run-tests: true
      run-lint: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  flutter-checks:
    name: Flutter
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true'
    uses: ./.github/workflows/reusable-flutter-setup.yml
    with:
      flutter-version: '3.41.4'
      working-directory: './frontend'
      run-tests: true
      run-lint: true
      upload-coverage: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security-audit:
    name: Security Audit
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Run security audit
        run: |
          cd backend
          uv sync --all-extras
          # safety check is used because safety scan requires an account/key in CI
          uv run safety check --policy-file .safety-policy.yml
          uv run pip-audit --ignore-vuln GHSA-w8v5-vhqr-4h9v

  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check PR size
        run: |
          # Sum added and deleted lines across all changed files.
          # git diff --numstat is more reliable than --shortstat whose field positions
          # shift depending on whether insertions or deletions are present.
          CHANGED_LINES=$(git diff --numstat origin/${{ github.base_ref }}...HEAD \
            | awk '{add+=$1; del+=$2} END {print add+del}')
          echo "Total lines changed: ${CHANGED_LINES}"
          if [ "${CHANGED_LINES}" -gt 1000 ]; then
            echo "::warning::PR is large (${CHANGED_LINES} lines changed). Consider splitting into smaller PRs."
          fi
