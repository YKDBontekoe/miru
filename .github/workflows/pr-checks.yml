name: PR Checks and Linting

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  # Backend checks
  backend-checks:
    name: Backend PR Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ./backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff black isort mypy pytest pytest-asyncio

      - name: Run Ruff linter
        run: ruff check --output-format=github .
        continue-on-error: false

      - name: Run Ruff formatter check
        run: ruff format --check .
        continue-on-error: false

      - name: Run isort check
        run: isort --check-only --diff .
        continue-on-error: false

      - name: Run MyPy type checker
        run: mypy --ignore-missing-imports app/
        continue-on-error: true

      - name: Run tests
        run: pytest -v --tb=short
        continue-on-error: true

  # Flutter checks
  flutter-checks:
    name: Flutter PR Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze project source
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

      - name: Build web app (verify build)
        run: flutter build web --release

      - name: Check for outdated dependencies
        run: flutter pub outdated
        continue-on-error: true

  # Security scan for dependencies
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Python security audit
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install safety and pip-audit
        run: |
          pip install safety pip-audit

      - name: Run safety check on backend
        working-directory: ./backend
        run: safety check -r requirements.txt
        continue-on-error: true

      - name: Run pip-audit on backend
        working-directory: ./backend
        run: pip-audit -r requirements.txt
        continue-on-error: true

      # Dart security audit (via pub outdated)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Check Flutter dependencies
        working-directory: ./frontend
        run: flutter pub audit
        continue-on-error: true

  # PR size check
  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          # Get the number of changed lines
          CHANGED_LINES=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD | awk '{print $4 + $6}')
          echo "Changed lines: $CHANGED_LINES"

          if [ "$CHANGED_LINES" -gt 1000 ]; then
            echo "::warning::PR is large ($CHANGED_LINES lines changed). Consider breaking it into smaller PRs."
          fi

          # Check for large files
          LARGE_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | while read file; do
            if [ -f "$file" ]; then
              SIZE=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 1048576 ]; then
                echo "$file ($((SIZE / 1024))KB)"
              fi
            fi
          done)

          if [ -n "$LARGE_FILES" ]; then
            echo "::warning::Large files detected:"
            echo "$LARGE_FILES"
          fi
