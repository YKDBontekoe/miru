name: PR Checks and Linting

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.13'
  FLUTTER_VERSION: '3.41.0'

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      workflows: ${{ steps.filter.outputs.workflows }}

    steps:
      - uses: actions/checkout@v6

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'supabase/migrations/**'
            frontend:
              - 'frontend/**'
            workflows:
              - '.github/workflows/**'

  backend-checks:
    name: Backend PR Checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.workflows == 'true'
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: './backend/pyproject.toml'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Type check with Mypy
        run: mypy .

      - name: Migration Drift Check
        run: |
          # Fails with exit code 1 if any model has changed without a corresponding
          # 'python manage.py makemigrations' being run and committed.
          # No database required — uses sqlite in-memory for schema generation.
          python manage.py check

      - name: Run tests
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          SUPABASE_JWT_SECRET: test-jwt-secret-that-is-long-enough-32ch
          OPENROUTER_API_KEY: test-key
          DEFAULT_CHAT_MODEL: google/gemma-3-27b-it:free
          EMBEDDING_MODEL: openai/text-embedding-3-small
          WEBAUTHN_RP_ID: localhost
          WEBAUTHN_RP_NAME: Miru Test
          WEBAUTHN_EXPECTED_ORIGIN: http://localhost
          CORS_ALLOWED_ORIGINS: "*"
        run: pytest -v --tb=short --cov=app --cov-report=term-missing --cov-fail-under=75

  # Flutter checks — only runs when frontend files change
  flutter-checks:
    name: Flutter PR Checks
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true'
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Clean and install dependencies
        run: |
          flutter clean
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Check for outdated dependencies
        run: flutter pub outdated
        continue-on-error: true

  # Flutter web build — only on PRs touching frontend/**
  flutter-web-build-check:
    name: Flutter Web Build Check
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'pull_request' &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflows == 'true')
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Build web app (verify build)
        run: flutter build web --release

  # Security scan for dependencies
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # Python security audit
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety and pip-audit
        run: |
          pip install safety pip-audit

      - name: Run safety check on backend
        working-directory: ./backend
        run: safety check

      - name: Run pip-audit on backend
        working-directory: ./backend
        run: pip-audit

      # Dart security audit
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Check Flutter dependencies
        working-directory: ./frontend
        run: flutter pub audit

  # PR size check
  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          # Get the number of changed lines
          CHANGED_LINES=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD | awk '{print $4 + $6}')
          echo "Changed lines: $CHANGED_LINES"

          if [ "$CHANGED_LINES" -gt 1000 ]; then
            echo "::warning::PR is large ($CHANGED_LINES lines changed). Consider breaking it into smaller PRs."
          fi

          # Check for large files
          LARGE_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | while read file; do
            if [ -f "$file" ]; then
              SIZE=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null || echo 0)
              if [ "$SIZE" -gt 1048576 ]; then
                echo "$file ($((SIZE / 1024))KB)"
              fi
            fi
          done)

          if [ -n "$LARGE_FILES" ]; then
            echo "::warning::Large files detected:"
            echo "$LARGE_FILES"
          fi
