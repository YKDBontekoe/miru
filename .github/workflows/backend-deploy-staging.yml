name: Backend — Deploy to Staging

# Triggers after the main backend-deploy workflow completes successfully on
# the develop branch. Keeps staging in sync with every develop push without
# bloating the main workflow file.
#
# Prerequisites:
#   • A staging Container App exists (default: aca-miru-staging).
#     Override via the STAGING_CONTAINER_APP_NAME repository variable.
#   • A 'staging' GitHub Environment exists with the STAGING_* secrets below.
#   • The service principal in AZURE_CREDENTIALS has Contributor on the
#     staging Container App and join/action on its managed environment.

on:
  workflow_run:
    workflows: ["Backend CI/CD - Deploy to Azure Container Apps"]
    branches: [develop]
    types: [completed]

permissions:
  contents: read
  packages: read
  id-token: write

env:
  IMAGE_NAME: miru-backend
  REGISTRY: ghcr.io
  STAGING_APP: ${{ vars.STAGING_CONTAINER_APP_NAME || 'aca-miru-staging' }}
  STAGING_RG:  ${{ vars.STAGING_RESOURCE_GROUP    || 'rg-miru' }}

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only proceed when the triggering workflow succeeded.
    if: github.event.workflow_run.conclusion == 'success'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Reconstruct image tag
        id: image-tag
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)
          TAG="${{ env.REGISTRY }}/${OWNER}/${{ env.IMAGE_NAME }}:develop-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${TAG}"

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify Docker image signature
        run: |
          cosign verify \
            --certificate-identity-regexp \
              "https://github.com/${{ github.repository }}/.github/workflows/backend-deploy.yml@.*" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.image-tag.outputs.tag }}"

      - name: Deploy image to staging
        env:
          SECRET_DATABASE_URL:                              ${{ secrets.STAGING_DATABASE_URL }}
          SECRET_SUPABASE_URL:                              ${{ secrets.STAGING_SUPABASE_URL }}
          SECRET_SUPABASE_KEY:                              ${{ secrets.STAGING_SUPABASE_KEY }}
          SECRET_SUPABASE_SERVICE_ROLE_KEY:                 ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          SECRET_SUPABASE_JWT_SECRET:                       ${{ secrets.STAGING_SUPABASE_JWT_SECRET }}
          SECRET_OPENROUTER_API_KEY:                        ${{ secrets.OPENROUTER_API_KEY }}
          SECRET_DEFAULT_CHAT_MODEL:                        ${{ secrets.DEFAULT_CHAT_MODEL }}
          SECRET_EMBEDDING_MODEL:                           ${{ secrets.EMBEDDING_MODEL }}
          SECRET_SECRET_KEY:                                ${{ secrets.STAGING_SECRET_KEY }}
          SECRET_WEBAUTHN_RP_ID:                            ${{ secrets.STAGING_WEBAUTHN_RP_ID }}
          SECRET_WEBAUTHN_RP_NAME:                          ${{ secrets.STAGING_WEBAUTHN_RP_NAME }}
          SECRET_WEBAUTHN_EXPECTED_ORIGIN:                  ${{ secrets.STAGING_WEBAUTHN_EXPECTED_ORIGIN }}
          SECRET_CORS_ALLOWED_ORIGINS:                      ${{ secrets.STAGING_CORS_ALLOWED_ORIGINS }}
          SECRET_TAVILY_API_KEY:                            ${{ secrets.TAVILY_API_KEY }}
          SECRET_SENTRY_DSN:                                ${{ secrets.SENTRY_DSN }}
          SECRET_AZURE_NOTIFICATION_HUB_NAME:               ${{ secrets.AZURE_NOTIFICATION_HUB_NAME }}
          SECRET_AZURE_NOTIFICATION_HUB_CONNECTION_STRING:  ${{ secrets.AZURE_NOTIFICATION_HUB_CONNECTION_STRING }}
        run: |
          IMAGE_TAG="${{ steps.image-tag.outputs.tag }}"
          [ -z "$IMAGE_TAG" ] && { echo "::error::image-tag is empty"; exit 1; }

          SECRETS=(
            "database-url=${SECRET_DATABASE_URL}"
            "supabase-url=${SECRET_SUPABASE_URL}"
            "supabase-key=${SECRET_SUPABASE_KEY}"
            "supabase-service-role-key=${SECRET_SUPABASE_SERVICE_ROLE_KEY}"
            "supabase-jwt-secret=${SECRET_SUPABASE_JWT_SECRET}"
            "openrouter-api-key=${SECRET_OPENROUTER_API_KEY}"
            "default-chat-model=${SECRET_DEFAULT_CHAT_MODEL}"
            "embedding-model=${SECRET_EMBEDDING_MODEL}"
            "secret-key=${SECRET_SECRET_KEY}"
            "webauthn-rp-id=${SECRET_WEBAUTHN_RP_ID}"
            "webauthn-rp-name=${SECRET_WEBAUTHN_RP_NAME}"
            "webauthn-expected-origin=${SECRET_WEBAUTHN_EXPECTED_ORIGIN}"
            "cors-allowed-origins=${SECRET_CORS_ALLOWED_ORIGINS}"
            "tavily-api-key=${SECRET_TAVILY_API_KEY}"
            "sentry-dsn=${SECRET_SENTRY_DSN}"
            "azure-notification-hub-name=${SECRET_AZURE_NOTIFICATION_HUB_NAME}"
            "azure-notification-hub-connection-string=${SECRET_AZURE_NOTIFICATION_HUB_CONNECTION_STRING}"
          )

          FILTERED_SECRETS=()
          FILTERED_ENV_VARS=()
          for secret in "${SECRETS[@]}"; do
            key="${secret%%=*}"; val="${secret#*=}"
            if [ -n "$val" ]; then
              FILTERED_SECRETS+=("$key=$val")
              env_key=$(echo "$key" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
              FILTERED_ENV_VARS+=("$env_key=secretref:$key")
            fi
          done
          FILTERED_ENV_VARS+=("SENTRY_ENVIRONMENT=staging")

          if [ ${#FILTERED_SECRETS[@]} -gt 0 ]; then
            az containerapp secret set \
              --name "${{ env.STAGING_APP }}" \
              --resource-group "${{ env.STAGING_RG }}" \
              --secrets "${FILTERED_SECRETS[@]}"
          fi

          az containerapp update \
            --name "${{ env.STAGING_APP }}" \
            --resource-group "${{ env.STAGING_RG }}" \
            --image "$IMAGE_TAG" \
            --set-env-vars "${FILTERED_ENV_VARS[@]}"

      - name: Wait for staging to become healthy
        # Scale-to-zero aware: --max-time 90 keeps the connection open through
        # a full ACA cold start rather than abandoning it mid-boot.
        run: |
          APP_URL=$(az containerapp show \
            --name "${{ env.STAGING_APP }}" \
            --resource-group "${{ env.STAGING_RG }}" \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "Staging URL: https://${APP_URL}"

          for i in $(seq 1 18); do
            REVISION=$(az containerapp revision list \
              --name "${{ env.STAGING_APP }}" \
              --resource-group "${{ env.STAGING_RG }}" \
              --query "sort_by([].{name:name,created:properties.createdTime}, &created) | [-1].name" \
              --output tsv)
            STATE=$(az containerapp revision show \
              --name "${{ env.STAGING_APP }}" \
              --resource-group "${{ env.STAGING_RG }}" \
              --revision "$REVISION" \
              --query "properties.runningState" --output tsv)
            echo "Attempt ${i}/18: ${REVISION} is ${STATE}"
            if [ "$STATE" = "Running" ] || [ "$STATE" = "RunningAtMaxScale" ]; then
              break
            fi
            sleep 10
          done

          for i in $(seq 1 5); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              --connect-timeout 10 --max-time 90 \
              "https://${APP_URL}/health" || echo "000")
            echo "Attempt ${i}/5: HTTP ${STATUS}"
            if [ "$STATUS" = "200" ]; then
              echo "Staging is healthy."
              exit 0
            fi
            [ "$i" -lt 5 ] && sleep 5
          done
          echo "::error::Staging did not become healthy within the expected window."
          exit 1
