name: Database Migrations

on:
  push:
    branches: [main, develop]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/database-migrations.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: database-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: './backend/pyproject.toml'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Migration drift check
        working-directory: ./backend
        run: |
          # Fails with exit code 1 if the committed SQL migration does not match
          # the current state of the Tortoise ORM models. No database required.
          python manage.py check

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate migration SQL syntax
        run: |
          echo "### Migration files" >> $GITHUB_STEP_SUMMARY
          for f in supabase/migrations/*.sql; do
            echo "- \`$(basename $f)\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "✓ Migration files found"

      - name: Dry-run migrations against local DB (full reset)
        run: |
          supabase db start
          supabase db reset --local
          echo "✓ All migrations apply cleanly to an empty database"

      - name: Dry-run incremental apply (simulate production upgrade)
        run: |
          # Apply all migrations except the newest one, then apply only the newest.
          # This catches errors that only surface when a migration runs on top of
          # an already-populated schema (e.g. CREATE TABLE without IF NOT EXISTS,
          # or ALTER TABLE on a column that doesn't exist yet in the baseline).
          MIGRATIONS=($(ls supabase/migrations/*.sql | sort))
          TOTAL=${#MIGRATIONS[@]}
          if [ "$TOTAL" -le 1 ]; then
            echo "Only one migration file — skipping incremental check."
            exit 0
          fi
          LATEST="${MIGRATIONS[$TOTAL-1]}"
          echo "Newest migration: $(basename $LATEST)"

          # Reset to a clean state and apply all but the newest
          supabase db reset --local
          BASELINE_MIGRATIONS=("${MIGRATIONS[@]::$TOTAL-1}")
          echo "Applying ${#BASELINE_MIGRATIONS[@]} baseline migration(s)..."
          for f in "${BASELINE_MIGRATIONS[@]}"; do
            echo "  applying $(basename $f)"
            supabase db query < "$f"
          done

          # Now apply only the newest migration on top of the populated DB
          echo "Applying newest migration incrementally: $(basename $LATEST)"
          supabase db query < "$LATEST"
          echo "✓ Newest migration applies cleanly on top of existing schema"

  run-migrations-staging:
    name: Run Migrations - Staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate-migrations
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF_STAGING }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Preview pending migrations (dry run)
        run: supabase db push --dry-run
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify migrations
        run: supabase migration list
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  run-migrations-production:
    name: Run Migrations - Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate-migrations
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Preview pending migrations (dry run)
        run: supabase db push --dry-run
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify migrations
        run: supabase migration list
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [run-migrations-staging, run-migrations-production]
    if: ${{ always() && (needs.run-migrations-staging.result == 'failure' || needs.run-migrations-production.result == 'failure') }}
    steps:
      - name: Notify failure
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: 'Database migrations failed!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
