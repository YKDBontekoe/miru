name: Database Migrations

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/app/migrations/**'
      - 'backend/alembic.ini'
      - '.github/workflows/database-migrations.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/app/migrations/**'
      - 'backend/alembic.ini'
  workflow_dispatch:
    inputs:
      command:
        description: 'Migration command to run'
        required: true
        default: 'upgrade'
        type: choice
        options:
          - upgrade
          - downgrade
          - current
          - history
      revision:
        description: 'Target revision (for upgrade/downgrade)'
        required: false
        default: 'head'
        type: string
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PYTHON_VERSION: '3.11'
  WORKING_DIRECTORY: ./backend

jobs:
  validate-migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    # Spin up a real DB so we can do a live upgrade dry-run
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check migration syntax
        run: |
          # Validate that all migration files are valid Python
          python -m py_compile app/migrations/versions/*.py
          echo "✓ All migration files compile successfully"

      - name: Check alembic configuration
        run: |
          # Verify alembic.ini exists and is valid
          python -c "import configparser; c = configparser.ConfigParser(); c.read('alembic.ini'); print('✓ alembic.ini is valid')"

      - name: Dry-run migration SQL (offline, no DB required)
        run: |
          echo "### Migration SQL dry-run" >> $GITHUB_STEP_SUMMARY
          echo '```sql' >> $GITHUB_STEP_SUMMARY
          alembic upgrade head --sql 2>&1 | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "✓ SQL dry-run completed"

      - name: Apply migrations to ephemeral DB (live validation)
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: |
          echo "Applying migrations to ephemeral database..."
          alembic upgrade head
          echo "Current revision:"
          alembic current
          echo "✓ Migrations applied and verified against live database"

  run-migrations-staging:
    name: Run Migrations - Staging
    runs-on: ubuntu-latest
    needs: validate-migrations
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migration command
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COMMAND="${{ github.event.inputs.command }}"
            REVISION="${{ github.event.inputs.revision }}"
          else
            COMMAND="upgrade"
            REVISION="head"
          fi
          
          echo "Running: alembic $COMMAND $REVISION"
          
          case $COMMAND in
            upgrade)
              alembic upgrade "$REVISION"
              ;;
            downgrade)
              alembic downgrade "$REVISION"
              ;;
            current)
              alembic current
              ;;
            history)
              alembic history --verbose
              ;;
            *)
              echo "Unknown command: $COMMAND"
              exit 1
              ;;
          esac

      - name: Verify migrations
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          echo "Current database revision:"
          alembic current

  run-migrations-production:
    name: Run Migrations - Production
    runs-on: ubuntu-latest
    needs: validate-migrations
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migration command
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COMMAND="${{ github.event.inputs.command }}"
            REVISION="${{ github.event.inputs.revision }}"
          else
            COMMAND="upgrade"
            REVISION="head"
          fi
          
          echo "Running: alembic $COMMAND $REVISION"
          
          case $COMMAND in
            upgrade)
              alembic upgrade "$REVISION"
              ;;
            downgrade)
              alembic downgrade "$REVISION"
              ;;
            current)
              alembic current
              ;;
            history)
              alembic history --verbose
              ;;
            *)
              echo "Unknown command: $COMMAND"
              exit 1
              ;;
          esac

      - name: Verify migrations
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: |
          echo "Current database revision:"
          alembic current

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [run-migrations-staging, run-migrations-production]
    if: failure()
    steps:
      - name: Notify failure
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: 'Database migrations failed!'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
