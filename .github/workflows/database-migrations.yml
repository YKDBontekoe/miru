name: Database Migrations

on:
  push:
    branches: [main, develop]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/database-migrations.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: database-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python
        run: uv python install 3.13

      - name: Migration drift check
        working-directory: ./backend
        run: |
          uv sync --frozen
          uv run python manage.py check

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate migration SQL syntax
        run: |
          echo "### Migration files" >> $GITHUB_STEP_SUMMARY
          for f in supabase/migrations/*.sql; do
            echo "- \`$(basename $f)\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "✓ Migration files found"

      - name: Dry-run migrations against local DB (full reset)
        run: |
          supabase db start
          supabase db reset --local
          echo "✓ All migrations apply cleanly to an empty database"

      - name: Stop local Supabase instance
        if: always()
        run: supabase db stop || true

  run-migrations-staging:
    name: Run Migrations - Staging
    needs: validate-migrations
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    uses: ./.github/workflows/reusable-supabase-migrate.yml
    with:
      environment: staging
      environment-url: ${{ vars.STAGING_URL }}
    secrets:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_STAGING }}

  run-migrations-production:
    name: Run Migrations - Production
    needs: validate-migrations
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    uses: ./.github/workflows/reusable-supabase-migrate.yml
    with:
      environment: production
      environment-url: ${{ vars.PRODUCTION_URL }}
    secrets:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
