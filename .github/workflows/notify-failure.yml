name: Notify on Workflow Completion

on:
  workflow_run:
    workflows:
      - "Backend CI/CD - Deploy to Azure Container Apps"
      - "Flutter CI/CD Pipeline"
      - "Database Migrations"
      - "Nightly Build and Dependency Check"
    types:
      - completed

jobs:
  notify-failure:
    name: Send Failure Notification
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'

    steps:
      - name: Send Discord notification
        if: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: failure
          title: 'Deployment Failed: ${{ github.event.workflow_run.name }}'
          description: |
            **Branch:** ${{ github.event.workflow_run.head_branch }}
            **Commit:** ${{ github.event.workflow_run.head_sha }}
          url: ${{ github.event.workflow_run.html_url }}
          color: 0xff0000
        continue-on-error: true

      - name: Send Slack notification
        if: secrets.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ github.event.workflow_run.conclusion }}
          text: |
            🚨 Workflow Failed

            Workflow: ${{ github.event.workflow_run.name }}
            Branch: ${{ github.event.workflow_run.head_branch }}

            <${{ github.event.workflow_run.html_url }}|View Run>
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Create issue for failure
        uses: actions/github-script@v8
        with:
          script: |
            const workflowName = '${{ github.event.workflow_run.name }}';
            const runId = '${{ github.event.workflow_run.id }}';
            const branch = '${{ github.event.workflow_run.head_branch }}';
            const sha = '${{ github.event.workflow_run.head_sha }}';
            const runUrl = '${{ github.event.workflow_run.html_url }}';

            const title = `🔥 Workflow Failed: ${workflowName}`;
            const body = `## Workflow Failure

            **Workflow:** ${workflowName}
            **Branch:** ${branch}
            **Commit:** ${sha}
            **Time:** ${new Date().toISOString()}

            ### Details
            - [View Workflow Run](${runUrl})

            ### Troubleshooting Steps
            1. Check the workflow logs for error messages
            2. Verify all secrets are properly configured
            3. Ensure Azure resources are accessible
            4. Check if any dependencies have changed

            This issue was automatically created by the CI/CD system.
            `;

            // Check if there's already an open issue for this workflow failure
            // to avoid duplicate issues accumulating across repeated failures.
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ci/cd,failure',
              state: 'open'
            });

            const existingIssue = issues.data.find(issue =>
              issue.title === title
            );

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['ci/cd', 'failure', 'automated']
              });
            }

  notify-success:
    name: Send Success Notification
    runs-on: ubuntu-latest
    # Only fire for the deploy workflow on main — not every CI run.
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.name == 'Backend CI/CD - Deploy to Azure Container Apps' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Send Discord notification
        if: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: success
          title: '🚀 Deployed: ${{ github.event.workflow_run.name }}'
          description: |
            **Branch:** ${{ github.event.workflow_run.head_branch }}
            **Commit:** `${{ github.event.workflow_run.head_sha }}`
          url: ${{ github.event.workflow_run.html_url }}
          color: 0x00cc44
        continue-on-error: true

      - name: Send Slack notification
        if: secrets.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: success
          text: |
            ✅ Production Deployed

            Workflow: ${{ github.event.workflow_run.name }}
            Branch: ${{ github.event.workflow_run.head_branch }}

            <${{ github.event.workflow_run.html_url }}|View Run>
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
