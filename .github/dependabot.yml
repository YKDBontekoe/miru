version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
      # Route failing Dependabot PRs through Jules for automated fix attempts.
      - "jules-fix-pending"
    commit-message:
      prefix: "pip"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    # Batch minor and patch updates into a single weekly PR to reduce noise.
    groups:
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Dart/Flutter dependencies
  - package-ecosystem: "pub"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "flutter"
      # Route failing Dependabot PRs through Jules for automated fix attempts.
      - "jules-fix-pending"
    commit-message:
      prefix: "pub"
      include: "scope"
    ignore:
      # Major version bumps for Flutter/Dart packages frequently contain breaking
      # API changes that require intentional manual upgrades, not auto-PRs.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "actions"
      include: "scope"
    # Group all action updates into a single weekly PR to reduce noise.
    # Without grouping, each action patch bump opens a separate PR.
    groups:
      github-actions-all:
        patterns:
          - "*"

  # Docker base images (keeps the backend Dockerfile's FROM up to date)
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"
      include: "scope"
